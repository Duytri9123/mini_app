<div class="rls-friends-page">
  <header class="rls-friends-header">
    <div>
      <span class="rls-friends-eyebrow">Social graph</span>
      <h2 class="rls-friends-title">Bạn bè</h2>
    </div>
    <button
      type="button"
      class="rls-icon-btn"
      (click)="loadSuggestions()"
      [disabled]="loading"
      aria-label="Làm mới gợi ý"
    >
      <i class="fa-solid fa-rotate-right" aria-hidden="true"></i>
    </button>
  </header>

  <section class="rls-friends-groups" aria-label="Nhóm gợi ý">
    <button type="button" *ngFor="let group of quickGroups">
      <span>{{ group.label }}</span>
      <strong>{{ group.value }}</strong>
    </button>
  </section>

  <section class="rls-friends-list" aria-label="Gợi ý kết bạn">
    <div *ngIf="loading" class="rls-friend-skeleton"></div>

    <article
      *ngFor="let item of suggestions; trackBy: trackBySuggestion"
      class="rls-friend-row"
    >
      <div class="rls-friend-avatar" aria-hidden="true">
        <img *ngIf="item.avatarUrl; else initial" [src]="item.avatarUrl" [alt]="item.displayName" />
        <ng-template #initial>{{ item.displayName.charAt(0) }}</ng-template>
      </div>

      <div class="rls-friend-main">
        <div class="rls-friend-main__top">
          <h3>{{ item.displayName }}</h3>
          <span>{{ sourceLabel(item.source) }}</span>
        </div>
        <p>
          {{ item.mutualCount }} bạn chung
          <ng-container *ngIf="item.distanceLabel"> · {{ item.distanceLabel }}</ng-container>
          <ng-container *ngIf="item.lastActiveLabel"> · {{ item.lastActiveLabel }}</ng-container>
        </p>
        <div class="rls-friend-metrics">
          <small>{{ item.postsCount }} bài đăng</small>
          <small>{{ item.phone || 'đã xác minh OTP' }}</small>
        </div>
      </div>

      <button
        type="button"
        class="rls-friend-action"
        [class.is-done]="item.status !== 'suggested'"
        [disabled]="item.status !== 'suggested'"
        (click)="connect(item)"
      >
        <i class="fa-solid fa-user-plus" aria-hidden="true"></i>
        <span>{{ actionLabel(item) }}</span>
      </button>
    </article>
  </section>
</div>
