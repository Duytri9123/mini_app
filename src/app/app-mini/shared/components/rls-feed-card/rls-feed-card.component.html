<article
  class="overflow-hidden rounded-2xl border border-white/10 bg-slate-900/60 text-slate-100 shadow-[0_0_18px_rgba(34,211,238,0.12)] backdrop-blur-md transition-colors hover:border-cyan-500/30"
>
  <!-- Header: tác giả + loại post -->
  <header class="flex items-center gap-3 px-4 pt-4">
    <div
      class="flex h-10 w-10 flex-shrink-0 items-center justify-center overflow-hidden rounded-full bg-gradient-to-br from-cyan-500/30 to-fuchsia-500/30 text-sm font-semibold text-cyan-100 ring-1 ring-white/15"
    >
      <img
        *ngIf="post.author?.avatarUrl as avatar; else initial"
        [src]="avatar"
        [alt]="authorName"
        class="h-full w-full object-cover"
      />
      <ng-template #initial>{{ authorInitial }}</ng-template>
    </div>

    <div class="min-w-0 flex-1">
      <p class="truncate text-sm font-semibold">{{ authorName }}</p>
      <p class="flex items-center gap-1 text-xs text-slate-400">
        <span [ngClass]="meta.accent">{{ meta.icon }} {{ meta.label }}</span>
        <span>·</span>
        <span class="truncate">{{ post.createdAt }}</span>
      </p>
    </div>
  </header>

  <!-- Nội dung text -->
  <p
    *ngIf="post.content"
    class="px-4 pt-3 text-sm leading-relaxed text-slate-200"
  >
    {{ post.content }}
  </p>

  <!-- Media (ảnh / video thumbnail) -->
  <div
    *ngIf="hasMedia"
    class="mt-3 aspect-video w-full overflow-hidden bg-slate-950"
  >
    <img
      [src]="coverUrl"
      [alt]="meta.label"
      class="h-full w-full object-cover"
      loading="lazy"
    />
  </div>

  <!-- Footer: counts + reaction bar + comment -->
  <footer class="flex items-center justify-between gap-3 px-4 py-3">
    <rls-reaction-bar
      [active]="post.myReaction ?? null"
      (react)="onReact($event)"
    ></rls-reaction-bar>

    <div class="flex items-center gap-4 text-xs text-slate-400">
      <span class="flex items-center gap-1" aria-label="Số reaction">
        🔥 {{ post.reactionsCount }}
      </span>
      <button
        type="button"
        (click)="onComment()"
        class="flex items-center gap-1 rounded-full px-2 py-1 transition-colors hover:bg-white/10 hover:text-cyan-200 active:scale-95"
        aria-label="Bình luận"
      >
        💬 {{ post.commentsCount }}
      </button>
    </div>
  </footer>
</article>
