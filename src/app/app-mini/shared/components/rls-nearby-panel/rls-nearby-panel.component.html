<div class="flex flex-col gap-2 py-1">
  <div class="flex items-center justify-between gap-2">
    <h2 class="flex min-w-0 items-center gap-1.5 text-xs font-semibold text-cyan-300">
      <svg class="h-3.5 w-3.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 21s-7-5.6-7-11a7 7 0 1114 0c0 5.4-7 11-7 11z" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="12" cy="10" r="2.5" />
      </svg>
      <span class="truncate">Gần bạn</span>
    </h2>

    <span
      *ngIf="radiusLabel"
      class="shrink-0 rounded-full border border-cyan-300/25 bg-cyan-400/10 px-2 py-0.5 text-[10px] font-semibold text-cyan-200"
    >
      Bán kính {{ radiusLabel }}
    </span>
  </div>

  <ng-container *ngIf="loading; else loadedTpl">
    <div *ngFor="let _ of [1, 2, 3]" class="flex items-center gap-2 rounded-xl bg-slate-900/45 p-2">
      <div class="h-11 w-11 shrink-0 animate-pulse rounded-xl bg-slate-700/60"></div>
      <div class="flex-1 space-y-1.5">
        <div class="h-3 w-2/3 animate-pulse rounded bg-slate-700/60"></div>
        <div class="h-3 w-1/3 animate-pulse rounded bg-slate-700/40"></div>
      </div>
    </div>
  </ng-container>

  <ng-template #loadedTpl>
    <div
      *ngIf="!places.length"
      class="flex flex-col items-center justify-center gap-2 rounded-2xl border border-dashed border-cyan-300/20 bg-slate-950/25 py-8 text-center text-slate-400"
    >
      <svg class="h-8 w-8 opacity-50" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="7" />
        <path d="M21 21l-4.3-4.3" stroke-linecap="round" />
      </svg>
      <p class="text-xs font-medium">Chưa có địa điểm nào gần đây</p>
    </div>

    <ul class="flex flex-col gap-1.5">
      <li *ngFor="let place of places; trackBy: trackById">
        <button
          type="button"
          class="flex w-full items-center gap-2 rounded-[14px] border border-cyan-300/15 bg-slate-950/45 p-2.5 text-left shadow-[0_0_18px_rgba(0,251,251,0.08)] backdrop-blur-md transition-all duration-200 hover:border-cyan-300/40 hover:bg-slate-900/70 hover:shadow-[0_0_18px_rgba(0,251,251,0.2)] active:scale-[0.99]"
          (click)="onSelect(place)"
        >
          <div class="h-12 w-12 shrink-0 overflow-hidden rounded-xl bg-slate-800">
            <img
              [src]="placeImageUrl(place)"
              [alt]="place.name"
              class="h-full w-full object-cover"
              loading="lazy"
              (error)="onImageError($event)"
            />
          </div>

          <div class="min-w-0 flex-1">
            <p class="truncate text-[13px] font-semibold leading-tight text-slate-100">{{ place.name }}</p>
            <div class="mt-0.5 flex items-center gap-1.5 text-[11px] leading-tight text-slate-400">
              <span class="truncate">{{ categoryLabel(place.category) }}</span>
              <span *ngIf="place.stats?.activeCount" class="flex items-center gap-1 text-emerald-400">
                <span class="h-1.5 w-1.5 rounded-full bg-emerald-500 shadow-[0_0_6px_rgba(16,185,129,0.8)]"></span>
                {{ place.stats?.activeCount }} đang hoạt động
              </span>
            </div>

            <div class="mt-1 flex flex-wrap items-center gap-1">
              <span
                *ngIf="formatDistance(place.distanceM) as dist"
                class="rounded-full border border-cyan-400/30 bg-cyan-500/10 px-1.5 py-0.5 text-[10px] font-semibold text-cyan-200"
              >
                Cách {{ dist }}
              </span>

            </div>
          </div>
        </button>

        <rls-place-inline-detail
          *ngIf="selectedPlaceId === place.id"
          [place]="place"
          [loading]="detailLoading"
          [detail]="detail"
          (close)="onCloseDetail()"
        ></rls-place-inline-detail>
      </li>
    </ul>
  </ng-template>
</div>
