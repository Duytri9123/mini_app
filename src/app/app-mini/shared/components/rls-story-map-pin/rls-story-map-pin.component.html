<button
  type="button"
  (click)="onTap()"
  class="relative flex flex-col items-center focus:outline-none"
  [attr.aria-label]="'Story của ' + authorName"
>
  <!-- Vòng tròn thumbnail + ring -->
  <span
    class="rounded-full p-[2px] transition-transform duration-150 active:scale-95"
    [ngClass]="
      isSeen
        ? 'bg-slate-500/70'
        : 'bg-gradient-to-tr from-fuchsia-500 via-cyan-400 to-amber-300 shadow-[0_0_12px_rgba(34,211,238,0.6)]'
    "
  >
    <span
      class="flex h-11 w-11 items-center justify-center overflow-hidden rounded-full bg-slate-900 text-xs font-semibold text-cyan-100 ring-2 ring-slate-950"
    >
      <img
        *ngIf="thumbUrl as src; else initial"
        [src]="src"
        [alt]="authorName"
        class="h-full w-full object-cover"
        loading="lazy"
      />
      <ng-template #initial>{{ authorInitial }}</ng-template>
    </span>
  </span>

  <!-- Đuôi pin -->
  <span
    class="-mt-0.5 h-0 w-0 border-x-[5px] border-t-[7px] border-x-transparent"
    [ngClass]="isSeen ? 'border-t-slate-500/70' : 'border-t-cyan-400'"
  ></span>
</button>
