<button
  type="button"
  (click)="onOpen()"
  class="flex w-16 flex-shrink-0 flex-col items-center gap-1 focus:outline-none"
  [attr.aria-label]="'Mở story của ' + authorName"
>
  <!-- Gradient ring (seen state) -->
  <span
    class="rounded-full p-[2.5px] transition-transform duration-150 active:scale-95"
    [ngClass]="
      isSeen
        ? 'bg-slate-600/60'
        : 'bg-gradient-to-tr from-fuchsia-500 via-cyan-400 to-amber-300 shadow-[0_0_14px_rgba(34,211,238,0.5)]'
    "
  >
    <span class="block rounded-full bg-slate-950 p-[2px]">
      <span
        class="flex h-14 w-14 items-center justify-center overflow-hidden rounded-full bg-gradient-to-br from-cyan-500/30 to-fuchsia-500/30 text-sm font-semibold text-cyan-100"
      >
        <img
          *ngIf="avatarUrl as src; else initial"
          [src]="src"
          [alt]="authorName"
          class="h-full w-full object-cover"
          loading="lazy"
        />
        <ng-template #initial>{{ authorInitial }}</ng-template>
      </span>
    </span>
  </span>

  <span
    *ngIf="showLabel"
    class="w-full truncate text-center text-[11px]"
    [ngClass]="isSeen ? 'text-slate-500' : 'text-slate-200'"
  >
    {{ authorName }}
  </span>
</button>
