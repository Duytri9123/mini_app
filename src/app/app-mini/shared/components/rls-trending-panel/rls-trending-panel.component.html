<!--
  RlsTrendingPanelComponent — panel trending trong bottom sheet (design.md §6.5, §9.3).
  Thuần trình bày: render `items` đã xếp hạng + gắn lý do; phát `open` khi user chọn.
  Style: dark neon glow + light glassmorphism (Tailwind v4, R14.5).
-->
<section class="flex flex-col gap-3" aria-label="Địa điểm đang trending gần bạn">
  <!-- Header -->
  <header class="flex items-center justify-between px-1">
    <h2 class="text-sm font-semibold text-slate-200">Đang trending gần bạn</h2>
    <span
      *ngIf="!loading && items.length"
      class="text-xs text-slate-400"
    >{{ items.length }} địa điểm</span>
  </header>

  <!-- Loading skeleton -->
  <ul *ngIf="loading" class="flex flex-col gap-2" aria-hidden="true">
    <li
      *ngFor="let s of [0, 1, 2, 3]"
      class="flex items-center gap-3 rounded-2xl border border-white/10 bg-slate-900/40 p-3"
    >
      <span class="h-14 w-14 flex-shrink-0 animate-pulse rounded-xl bg-slate-700/40"></span>
      <span class="flex min-w-0 flex-1 flex-col gap-2">
        <span class="h-3 w-2/3 animate-pulse rounded bg-slate-700/40"></span>
        <span class="h-3 w-1/3 animate-pulse rounded bg-slate-700/30"></span>
      </span>
    </li>
  </ul>

  <!-- Empty state -->
  <div
    *ngIf="!loading && !items.length"
    class="flex flex-col items-center justify-center gap-2 rounded-2xl border border-white/10 bg-slate-900/40 px-4 py-8 text-center"
  >
    <span class="text-2xl" aria-hidden="true">🛰️</span>
    <p class="text-sm font-medium text-slate-200">Chưa có địa điểm trending</p>
    <p class="text-xs text-slate-400">Hãy thử mở rộng khu vực hoặc quay lại sau.</p>
  </div>

  <!-- Danh sách spot trending -->
  <ul *ngIf="!loading && items.length" class="flex flex-col gap-2">
    <li *ngFor="let item of items; trackBy: trackById">
      <button
        type="button"
        (click)="onOpen(item)"
        class="flex w-full items-center gap-3 rounded-2xl border border-white/10 bg-slate-900/60 p-3 text-left text-slate-100 shadow-[0_0_16px_rgba(168,85,247,0.12)] backdrop-blur-md transition-colors hover:border-fuchsia-500/30 active:scale-[0.99]"
        [attr.aria-label]="'Mở ' + item.name"
      >
        <!-- Thumbnail / rank -->
        <span
          class="relative flex h-14 w-14 flex-shrink-0 items-center justify-center overflow-hidden rounded-xl bg-gradient-to-br from-fuchsia-500/30 to-cyan-500/30 text-lg font-semibold text-fuchsia-100 ring-1 ring-white/15"
        >
          <img
            *ngIf="item.thumbnailUrl as src; else rankTpl"
            [src]="src"
            [alt]="item.name"
            class="h-full w-full object-cover"
            loading="lazy"
          />
          <ng-template #rankTpl>
            <span>{{ item.rank ? '#' + item.rank : (item.name || '?').charAt(0).toUpperCase() }}</span>
          </ng-template>
        </span>

        <!-- Nội dung -->
        <span class="min-w-0 flex-1">
          <span class="truncate text-sm font-semibold">{{ item.name }}</span>

          <!-- Badge lý do trending (R6.4) -->
          <span
            class="mt-1 inline-flex items-center gap-1 rounded-full border px-2 py-0.5 text-[11px] font-medium"
            [ngClass]="reasonBadgeClass(item)"
          >
            <span aria-hidden="true">{{ reasonIcon(item) }}</span>
            <span>{{ reasonLabel(item) }}</span>
          </span>

          <!-- Category -->
          <span class="mt-1 block truncate text-xs capitalize text-slate-400">{{ item.category }}</span>
        </span>

        <!-- Chevron -->
        <span class="flex-shrink-0 text-slate-500" aria-hidden="true">›</span>
      </button>
    </li>
  </ul>
</section>
