<!-- ── MOBILE: notch bottom bar ── -->
<div
  #navBar
  class="bj-footer relative z-50 md:hidden"
>
  <svg
    class="absolute left-0 bottom-0 w-full pointer-events-none"
    [attr.height]="barHeight"
    [attr.viewBox]="'0 0 ' + navWidth + ' ' + barHeight"
    preserveAspectRatio="none"
    style="overflow: visible"
  >
    <path [attr.d]="shadowPath" fill="transparent" />
    <path [attr.d]="bgPath" fill="white" />
  </svg>

  <div
    class="relative z-10 grid items-end"
    style="height: 68px; grid-template-columns: repeat(5, 1fr)"
  >
    <ng-container *ngFor="let tab of tabs">
      <button
        *ngIf="tab.center; else normalMobile"
        (click)="navigate(tab.route)"
        class="relative flex flex-col items-center justify-end pb-2 transition-transform duration-150 active:scale-90 outline-none"
        [attr.aria-label]="tab.label"
        [attr.aria-current]="activeTab === tab.tab ? 'page' : null"
        style="transform: translateY(-8px); overflow: visible"
      >
        <span
          class="absolute flex items-center justify-center rounded-full shadow-lg [&_svg]:w-6 [&_svg]:h-6 text-white"
          [style.background]="'linear-gradient(135deg,' + BJ_COLORS.PRIMARY + ' 0%,' + BJ_COLORS.PRIMARY_DARK + ' 100%)'"
          style="width:60px;height:60px;top:-54px;left:50%;transform:translateX(-50%)"
          [innerHTML]="tab.icon"
        ></span>
        <span
          class="text-[11px] font-extrabold leading-none whitespace-nowrap"
          [style.color]="activeTab === tab.tab ? BJ_COLORS.PRIMARY : BJ_COLORS.TEXT_SECONDARY"
          style="margin-top:28px"
        >{{ tab.label }}</span>
      </button>

      <ng-template #normalMobile>
        <button
          (click)="navigate(tab.route)"
          class="relative flex flex-col items-center justify-end px-2 pb-3 transition-all duration-150 active:scale-90 outline-none"
          [attr.aria-label]="tab.label"
          [attr.aria-current]="activeTab === tab.tab ? 'page' : null"
        >
          <span
            class="w-6 h-6 flex items-center justify-center"
            [style.color]="activeTab === tab.tab ? BJ_COLORS.PRIMARY : BJ_COLORS.INACTIVE"
            [innerHTML]="tab.icon"
          ></span>
          <span
            class="text-[10px] font-semibold mt-0.5 whitespace-nowrap"
            [style.color]="activeTab === tab.tab ? BJ_COLORS.PRIMARY : BJ_COLORS.INACTIVE"
          >{{ tab.label }}</span>
        </button>
      </ng-template>
    </ng-container>
  </div>
</div>

<!-- ── DESKTOP: flat bottom bar, icon + label layout ── -->
<nav class="hidden md:block relative z-50 bg-white border-t border-gray-100"
     style="box-shadow: 0 -2px 12px rgba(0,0,0,0.06)">
  <div class="w-full max-w-3xl flex justify-around items-center h-20 mx-auto px-4">
    <button
      *ngFor="let tab of tabs"
      (click)="navigate(tab.route)"
      class="flex flex-col items-center justify-center gap-1 py-2 rounded-xl transition-all duration-150 outline-none min-w-[60px]"
      [style.color]="activeTab === tab.tab ? BJ_COLORS.PRIMARY : BJ_COLORS.INACTIVE"
      [attr.aria-label]="tab.label"
      [attr.aria-current]="activeTab === tab.tab ? 'page' : null"
    >
      <span
        class="w-6 h-6 flex items-center justify-center"
        [innerHTML]="tab.iconDesktop ?? tab.icon"
      ></span>
      <span
        class="text-[11px] font-semibold whitespace-nowrap"
      >{{ tab.label }}</span>
    </button>
  </div>
</nav>
