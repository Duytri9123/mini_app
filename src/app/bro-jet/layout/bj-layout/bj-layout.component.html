<!-- Root layout: header → content → footer -->
<div class="flex flex-col h-[100dvh] overflow-hidden bg-[#f5f7f8]">

  <!-- Header -->
  <div *ngIf="showHeader" class="flex-shrink-0">
    <app-bj-header [title]="pageTitle" [showBack]="showBack" [hideUser]="hideUser" [showNotification]="showNotification" [hideLogo]="hideLogo"></app-bj-header>
  </div>

  <!-- Content: flex-1, scroll area with bottom padding for fixed footer -->
  <div class="flex-1 min-h-0"
       [class.overflow-y-auto]="!isMapPage"
       [class.overflow-hidden]="isMapPage"
       [style.padding-bottom]="showFooter ? 'calc(68px + env(safe-area-inset-bottom, 0px))' : '0'">
    <router-outlet></router-outlet>
  </div>

  <!-- Footer: fixed, đẩy lên trên safe-area -->
  <div *ngIf="showFooter" class="fixed left-0 right-0 z-50" style="bottom: env(safe-area-inset-bottom, 0px)">
    <app-bj-footer></app-bj-footer>
  </div>
  <!-- White fill for safe area below footer -->
  <div *ngIf="showFooter" class="fixed bottom-0 left-0 right-0 bg-white z-40" style="height: env(safe-area-inset-bottom, 0px)"></div>

</div>
