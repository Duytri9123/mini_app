<div class="h-full relative overflow-hidden">

  <!-- ==================== MAP CONTENT ==================== -->
  <div class="absolute inset-0 z-0 transition-all duration-300"
       [style.left.px]="(sidebarVisible && isDesktop) ? sidebarWidth : 0"
       style="right:0; top:0; bottom:0;"
       [ngClass]="{'md:transition-all md:duration-300': true}">
    <ng-content select="[mapContent]"></ng-content>
  </div>

  <!-- ==================== DESKTOP SIDEBAR ==================== -->
  <div class="hidden md:block absolute left-0 top-0 bottom-0 z-[1002]
              bg-white shadow-[4px_0_24px_rgba(0,0,0,0.08)] overflow-hidden
              transition-transform duration-300 ease-in-out"
       [style.width.px]="sidebarWidth"
       [class.translate-x-0]="sidebarVisible"
       [class.-translate-x-full]="!sidebarVisible">
    <ng-content select="[sidebarContent]"></ng-content>
  </div>

  <!-- ==================== SIDEBAR TOGGLE BUTTON ==================== -->
  <button (click)="toggle()"
          class="hidden md:flex fixed top-[50dvh] -translate-y-1/2 z-[1003]
                 items-center justify-center w-8 h-16 bg-white
                 shadow-[2px_0_12px_rgba(0,0,0,0.15)] hover:shadow-[2px_0_16px_rgba(0,0,0,0.25)]
                 transition-all duration-300 cursor-pointer border-y border-r border-gray-200
                 rounded-r-lg hover:w-9 group"
          [style.left.px]="sidebarVisible ? sidebarWidth : 0">
    <svg class="w-5 h-5 text-gray-600 transition-transform duration-300 group-hover:scale-110"
         [class.rotate-180]="sidebarVisible"
         fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/>
    </svg>
    <div class="absolute left-full ml-2 px-3 py-1.5 bg-gray-900 text-white text-xs rounded-lg
                whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none">
      {{ sidebarVisible ? 'Ẩn danh sách' : 'Hiện danh sách' }}
      <div class="absolute right-full top-1/2 -translate-y-1/2 border-4 border-transparent border-r-gray-900"></div>
    </div>
  </button>

  <!-- ==================== MOBILE BOTTOM SHEET ==================== -->

  <!-- Toggle Button: Circular primary-colored button with 3-bar icon -->
  <div *ngIf="showMobileSheet"
       class="md:hidden fixed right-4 z-[9999] pointer-events-auto transition-all duration-300"
       style="bottom: calc(68px + env(safe-area-inset-bottom, 0px) + 24px);">
    <button (click)="sheetState === 'hidden' ? openSheet('half') : openSheet('hidden')"
            class="size-12 rounded-full bg-primary text-white shadow-[0_8px_24px_rgba(0,173,239,0.35)] flex items-center justify-center active:scale-95 transition-all">
      <svg *ngIf="sheetState === 'hidden'" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
      </svg>
      <svg *ngIf="sheetState !== 'hidden'" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
  </div>

  <!-- Sheet panel -->
  <div *ngIf="showMobileSheet"
       class="md:hidden fixed left-0 right-0 z-[40] pointer-events-none flex flex-col will-change-transform"
       style="top: 0; bottom: calc(68px + env(safe-area-inset-bottom, 0px));"
       [style.transform]="'translateY(' + sheetTranslateY + 'px)'"
       [style.transition]="isAnimating ? 'transform 0.3s cubic-bezier(0.32,0.72,0,1)' : 'none'">

    <div class="flex flex-col h-full bg-white rounded-t-2xl shadow-[0_-4px_24px_rgba(0,0,0,0.12)] pointer-events-auto"
         (touchstart)="onSheetTouchStart($event)"
         (touchmove)="onTouchMove($event)"
         (touchend)="onTouchEnd()"
         (mousedown)="onSheetMouseDown($event)">

      <!-- Drag handle -->
      <div *ngIf="!hideHandle" class="flex-shrink-0 cursor-grab active:cursor-grabbing select-none sheet-drag-zone"
           style="touch-action: none; padding: 12px 16px;">
        <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto hover:bg-gray-400 transition-colors"></div>
      </div>

      <!-- Sheet content -->
      <div class="flex-1 min-h-0 overflow-hidden" style="-webkit-overflow-scrolling: touch;">
        <ng-content select="[sheetContent]"></ng-content>
      </div>
    </div>
  </div>

</div>
