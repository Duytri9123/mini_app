<ion-content style="--background: #f8fffe">
  <app-bj-navbar
    [items]="navItems"
    [activeKey]="activeTab"
    (activeKeyChange)="onTabChange($event)"
  ></app-bj-navbar>

  <div class="flex-1 overflow-y-auto px-4 pt-10 pb-8">

    <!-- Loading State -->
    <div *ngIf="isLoading" class="flex justify-center items-center py-16">
      <ion-spinner name="crescent" color="primary"></ion-spinner>
    </div>

    <!-- Empty State -->
    <ng-container *ngIf="!isLoading && visibleCategories.length === 0">
      <app-bj-empty-state
        title="Không có câu hỏi nào"
        subtitle="Chưa có câu hỏi nào trong mục này"
      ></app-bj-empty-state>
    </ng-container>

    <!-- FAQ Categories -->
    <ng-container *ngIf="!isLoading && visibleCategories.length > 0">
      <section *ngFor="let category of visibleCategories" class="mb-6">
        <h3 class="text-[#1a1a1a] text-sm font-bold uppercase tracking-wider mb-3 flex items-center gap-2">
          <span
            class="w-5 h-5 text-emerald-500"
            [innerHTML]="getCategoryIconSvg(category.slug)"
          ></span>
          {{ category.name }}
        </h3>

        <div class="space-y-3">
          <div
            *ngFor="let faq of category.faqs"
            class="rounded-2xl border border-slate-100 bg-white shadow-sm overflow-hidden transition-all"
          >
            <!-- Question row -->
            <div
              class="p-4 flex justify-between items-center cursor-pointer select-none"
              (click)="toggleFaq(faq.id)"
            >
              <p class="font-semibold text-[#374151] flex-1 pr-2">
                {{ faq.question }}
              </p>
              <span
                class="w-5 h-5 text-[#6b7280] transition-transform duration-300 flex-shrink-0"
                [class.rotate-180]="isExpanded(faq.id)"
                [innerHTML]="chevronIcon"
              ></span>
            </div>

            <!-- Answer (accordion) -->
            <div
              *ngIf="isExpanded(faq.id)"
              class="px-4 pb-4 text-sm text-[#6b7280] leading-relaxed border-t border-slate-100 pt-3"
            >
              {{ faq.answer }}
            </div>
          </div>
        </div>
      </section>
    </ng-container>

    <!-- Contact Support Section -->

      <h4 class="font-bold text-[#1a1a1a]">Vẫn cần hỗ trợ?</h4>
      <p class="text-sm text-[#6b7280] mt-1 mb-4">Đội ngũ hỗ trợ luôn sẵn sàng 24/7</p>
      <button
        type="button"
        (click)="onOpenSupportChat()"

      >
        Chat với chúng tôi
      </button>
    </div> -->

  </div>
</ion-content>
