<div class="bj-auth-page">
  <div class="bj-auth-bg-particles">
    <div class="bj-particle bj-particle-1"></div>
    <div class="bj-particle bj-particle-2"></div>
  </div>

  <main class="bj-auth-main">
    <!-- Brand -->
    <div class="bj-auth-brand">
      <div class="bj-auth-logo-wrapper">
        <div class="bj-auth-logo-glow"></div>
        <div class="bj-auth-logo-container">
          <img alt="BROJET" src="assets/images/logo_bro_jet.jpg" class="bj-auth-logo-img" />
        </div>
      </div>
      <h1 class="bj-auth-brand-name">BROJET</h1>
      <p class="bj-auth-brand-tagline">Khôi phục tài khoản</p>
    </div>

    <!-- STEP 1 -->
    <ng-container *ngIf="step === 1">
      <section class="bj-auth-card">
        <div class="bj-auth-card-glow"></div>
        <h2 class="bj-auth-card-title">Quên mật khẩu</h2>
        <div class="bj-auth-card-title-bar"></div>
        <p class="bj-auth-card-subtitle">Nhập email đã đăng ký để nhận link đặt lại mật khẩu.</p>

        <form [formGroup]="emailForm" (ngSubmit)="submitForgotPassword()" novalidate class="bj-auth-form" style="margin-top:1rem">
          <div class="bj-auth-field">
            <label class="bj-auth-label">Email</label>
            <div class="bj-auth-input-wrapper" [class.bj-auth-input-error]="emailForm.get('email')?.invalid && emailForm.get('email')?.touched">
              <span class="bj-auth-input-icon" [innerHTML]="icons.EMAIL | safeSvg"></span>
              <input type="email" formControlName="email" placeholder="example@gmail.com" autocomplete="email" class="bj-auth-input" />
            </div>
            <p *ngIf="emailForm.get('email')?.invalid && emailForm.get('email')?.touched" class="bj-auth-error">Vui lòng nhập email hợp lệ</p>
          </div>



          <button type="submit" [disabled]="emailForm.invalid || loading" class="bj-auth-btn-primary">
            <span *ngIf="!loading">GỬI LINK ĐẶT LẠI</span>
            <span *ngIf="loading" class="bj-auth-btn-loading">
              <svg class="animate-spin" width="18" height="18" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
              </svg>
              Đang gửi...
            </span>
          </button>
        </form>

        <div class="bj-auth-footer-link">
          <a routerLink="/bro-jet/login">
            <span class="bj-auth-icon-xs" [innerHTML]="icons.ARROW_BACK | safeSvg"></span>
            Quay lại đăng nhập
          </a>
        </div>
      </section>
    </ng-container>

    <!-- STEP 2 -->
    <ng-container *ngIf="step === 2">
      <section class="bj-auth-card">
        <div class="bj-auth-card-glow"></div>
        <h2 class="bj-auth-card-title">Đặt lại mật khẩu</h2>
        <div class="bj-auth-card-title-bar"></div>
        <p class="bj-auth-card-subtitle">Nhập mã token từ email và mật khẩu mới.</p>

        <form [formGroup]="resetForm" (ngSubmit)="submitResetPassword()" novalidate class="bj-auth-form" style="margin-top:1rem">
          <div class="bj-auth-field">
            <label class="bj-auth-label">Mã xác nhận</label>
            <div class="bj-auth-input-wrapper">
              <span class="bj-auth-input-icon" [innerHTML]="icons.KEY | safeSvg"></span>
              <input type="text" formControlName="token" placeholder="Nhập mã từ email" class="bj-auth-input" />
            </div>
          </div>

          <div class="bj-auth-field">
            <label class="bj-auth-label">Email</label>
            <div class="bj-auth-input-wrapper">
              <span class="bj-auth-input-icon" [innerHTML]="icons.EMAIL | safeSvg"></span>
              <input type="email" formControlName="email" placeholder="example@gmail.com" autocomplete="email" class="bj-auth-input" />
            </div>
          </div>

          <div class="bj-auth-field">
            <label class="bj-auth-label">Mật khẩu mới</label>
            <div class="bj-auth-input-wrapper">
              <span class="bj-auth-input-icon" [innerHTML]="icons.LOCK | safeSvg"></span>
              <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Ít nhất 8 ký tự" autocomplete="new-password" class="bj-auth-input bj-auth-input-password" />
              <button type="button" (click)="showPassword = !showPassword" class="bj-auth-toggle-password">
                <span class="bj-auth-icon-sm" [innerHTML]="(showPassword ? icons.EYE_OFF : icons.EYE) | safeSvg"></span>
              </button>
            </div>
          </div>

          <div class="bj-auth-field">
            <label class="bj-auth-label">Xác nhận mật khẩu</label>
            <div class="bj-auth-input-wrapper">
              <span class="bj-auth-input-icon" [innerHTML]="icons.SHIELD_CHECK | safeSvg"></span>
              <input [type]="showConfirmPassword ? 'text' : 'password'" formControlName="password_confirmation" placeholder="Nhập lại mật khẩu" autocomplete="new-password" class="bj-auth-input bj-auth-input-password" />
              <button type="button" (click)="showConfirmPassword = !showConfirmPassword" class="bj-auth-toggle-password">
                <span class="bj-auth-icon-sm" [innerHTML]="(showConfirmPassword ? icons.EYE_OFF : icons.EYE) | safeSvg"></span>
              </button>
            </div>
          </div>



          <button type="submit" [disabled]="resetForm.invalid || loading" class="bj-auth-btn-primary">
            <span *ngIf="!loading">ĐẶT LẠI MẬT KHẨU</span>
            <span *ngIf="loading" class="bj-auth-btn-loading">
              <svg class="animate-spin" width="18" height="18" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
              </svg>
              Đang xử lý...
            </span>
          </button>

          <button type="button" (click)="goBackToEmail()" class="bj-auth-btn-secondary">Gửi lại email</button>
        </form>

        <div class="bj-auth-footer-link">
          <a routerLink="/bro-jet/login">
            <span class="bj-auth-icon-xs" [innerHTML]="icons.ARROW_BACK | safeSvg"></span>
            Quay lại đăng nhập
          </a>
        </div>
      </section>
    </ng-container>
  </main>
</div>
