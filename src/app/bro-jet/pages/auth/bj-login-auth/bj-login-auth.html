<div class="bj-auth-page">
  <div class="bj-auth-bg-particles">
    <div class="bj-particle bj-particle-1"></div>
    <div class="bj-particle bj-particle-2"></div>
  </div>

  <main class="bj-auth-main">
    <!-- Brand -->
    <div class="bj-auth-brand">
      <div class="bj-auth-logo-wrapper">
        <div class="bj-auth-logo-glow"></div>
        <div class="bj-auth-logo-container">
          <img alt="BROJET" src="assets/images/logo_bro_jet.jpg" class="bj-auth-logo-img" />
        </div>
      </div>
      <h1 class="bj-auth-brand-name">BROJET</h1>
      <p class="bj-auth-brand-tagline">Auto Spa</p>
    </div>

    <!-- Card -->
    <section class="bj-auth-card">
      <div class="bj-auth-card-glow"></div>

      <h2 class="bj-auth-card-title">Đăng nhập</h2>
      <div class="bj-auth-card-title-bar"></div>

      <form [formGroup]="loginForm" (ngSubmit)="submitLogin()" novalidate class="bj-auth-form" style="margin-top:1.25rem">

        <!-- Identifier (Email or Phone) -->
        <div class="bj-auth-field">
          <label class="bj-auth-label">Email hoặc Số điện thoại <span class="bj-auth-label-required">*</span></label>
          <div class="bj-auth-input-wrapper" [class.bj-auth-input-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            <span class="bj-auth-input-icon" [innerHTML]="icons.EMAIL | safeSvg"></span>
            <input type="text" formControlName="email" placeholder="example@gmail.com hoặc 09..."
              autocomplete="username" class="bj-auth-input" />
          </div>
          <p *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="bj-auth-error">
            Vui lòng nhập Email hoặc Số điện thoại
          </p>
        </div>

        <!-- Password -->
        <div class="bj-auth-field">
          <label class="bj-auth-label">Mật khẩu <span class="bj-auth-label-required">*</span></label>
          <div class="bj-auth-input-wrapper" [class.bj-auth-input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            <span class="bj-auth-input-icon" [innerHTML]="icons.LOCK | safeSvg"></span>
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
              placeholder="••••••••" autocomplete="current-password" class="bj-auth-input bj-auth-input-password" />
            <button type="button" (click)="showPassword = !showPassword" class="bj-auth-toggle-password">
              <span class="bj-auth-icon-sm" [innerHTML]="(showPassword ? icons.EYE_OFF : icons.EYE) | safeSvg"></span>
            </button>
          </div>
          <p *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="bj-auth-error">
            Mật khẩu phải có ít nhất 6 ký tự
          </p>
        </div>

        <!-- Forgot -->
        <div class="bj-auth-forgot-link">
          <a routerLink="/bro-jet/forgot-password">Quên mật khẩu?</a>
        </div>

        <!-- Error -->
        <p *ngIf="errorMsg" class="bj-auth-error-global">{{ errorMsg }}</p>

        <!-- Submit -->
        <button type="submit" [disabled]="loginForm.invalid || loading" class="bj-auth-btn-primary">
          <span *ngIf="!loading">ĐĂNG NHẬP</span>
          <span *ngIf="loading" class="bj-auth-btn-loading">
            <svg class="animate-spin" width="18" height="18" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
            </svg>
            Đang xử lý...
          </span>
        </button>
      </form>

      <!-- Divider -->
      <!-- <div class="bj-auth-divider"><span>hoặc</span></div>

      <button type="button" [disabled]="isGoogleLoading || loading" (click)="loginWithGoogle()" class="bj-auth-btn-google">
        <span *ngIf="!isGoogleLoading" class="bj-auth-icon-google" [innerHTML]="icons.GOOGLE | safeSvg"></span>
        <svg *ngIf="isGoogleLoading" class="animate-spin" width="18" height="18" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
        </svg>
        <span>{{ isGoogleLoading ? 'Đang kết nối...' : 'Tiếp tục với Google' }}</span>
      </button> -->

      <!-- Footer -->
      <div class="bj-auth-footer-link" style="flex-direction:row; gap:0.4rem; justify-content:center;">
        <p>Chưa có tài khoản?</p>
        <a routerLink="/bro-jet/register">Đăng ký ngay <span class="bj-auth-icon-xs" [innerHTML]="icons.ARROW_FORWARD | safeSvg"></span></a>
      </div>
    </section>

    <!-- Back to home (outside card, aligned left) -->
    <a routerLink="/bro-jet/home" class="bj-auth-btn-link" style="margin-top:1rem; justify-content:flex-start;">
      <span class="bj-auth-icon-xs" [innerHTML]="icons.ARROW_BACK | safeSvg"></span>
      Quay về trang chủ
    </a>
  </main>
</div>
