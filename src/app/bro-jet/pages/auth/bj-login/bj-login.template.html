<div class="bj-auth-page">
  <div class="bj-auth-bg-particles">
    <div class="bj-particle bj-particle-1"></div>
    <div class="bj-particle bj-particle-2"></div>
  </div>

  <main class="bj-auth-main">
    <!-- Brand -->
    <div class="bj-auth-brand">
      <div class="bj-auth-logo-wrapper">
        <div class="bj-auth-logo-glow"></div>
        <div class="bj-auth-logo-container">
          <img alt="BROJET" src="assets/images/logo_bro_jet.jpg" class="bj-auth-logo-img" />
        </div>
      </div>
      <h1 class="bj-auth-brand-name">BROJET</h1>
      <p class="bj-auth-brand-tagline">Auto Spa</p>
    </div>

    <!-- Card -->
    <section class="bj-auth-card">
      <div class="bj-auth-card-glow"></div>

      <h2 class="bj-auth-card-title">Đăng nhập</h2>
      <div class="bj-auth-card-title-bar"></div>

      <!-- ═══ STEP 1: Nhập số điện thoại ═══ -->
      <form *ngIf="step === 'phone'" (ngSubmit)="continueWithPhone()" novalidate class="bj-auth-form"
        style="margin-top:1.25rem">

        <div class="bj-auth-field">
          <label class="bj-auth-label">Số điện thoại</label>
          <div class="bj-auth-input-wrapper" [class.bj-auth-input-error]="phoneError">
            <span class="bj-auth-input-icon" [innerHTML]="icons.PHONE | safeSvg"></span>
            <input type="tel" [(ngModel)]="phone" name="phone" (input)="onPhoneInput()" placeholder="0xx xxx xxxx"
              autocomplete="tel" class="bj-auth-input" />
          </div>
          <p *ngIf="phoneError" class="bj-auth-error">{{ phoneError }}</p>
        </div>



        <!-- Submit -->
        <button type="submit" [disabled]="loading" class="bj-auth-btn-primary">
          <span *ngIf="!loading">TIẾP TỤC</span>
          <span *ngIf="loading" class="bj-auth-btn-loading">
            <svg class="animate-spin" width="18" height="18" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
            </svg>
            Đang kiểm tra...
          </span>
        </button>
      </form>

      <!-- ═══ STEP 2a: Nhập mật khẩu ═══ -->
      <form *ngIf="step === 'password'" (ngSubmit)="loginWithPassword()" novalidate class="bj-auth-form"
        style="margin-top:1.25rem">

        <div class="bj-auth-field">
          <label class="bj-auth-label">Số điện thoại</label>
          <div class="bj-auth-input-wrapper bj-auth-input-readonly">
            <span class="bj-auth-input-icon" [innerHTML]="icons.PHONE | safeSvg"></span>
            <input type="tel" [value]="phone" readonly class="bj-auth-input" />
          </div>
        </div>

        <div class="bj-auth-field">
          <label class="bj-auth-label">Mật khẩu</label>
          <div class="bj-auth-input-wrapper" [class.bj-auth-input-error]="passwordError">
            <span class="bj-auth-input-icon" [innerHTML]="icons.LOCK | safeSvg"></span>
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password"
              placeholder="Nhập mật khẩu" autocomplete="current-password"
              class="bj-auth-input bj-auth-input-password" />
            <button type="button" (click)="showPassword = !showPassword" class="bj-auth-toggle-password">
              <span class="bj-auth-icon-sm" [innerHTML]="(showPassword ? icons.EYE_OFF : icons.EYE) | safeSvg"></span>
            </button>
          </div>
          <p *ngIf="passwordError" class="bj-auth-error">{{ passwordError }}</p>
        </div>



        <!-- Submit -->
        <button type="submit" [disabled]="loading" class="bj-auth-btn-primary">
          <span *ngIf="!loading">ĐĂNG NHẬP</span>
          <span *ngIf="loading" class="bj-auth-btn-loading">
            <svg class="animate-spin" width="18" height="18" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
            </svg>
            Đang đăng nhập...
          </span>
        </button>

        <!-- OTP alternative -->
        <button type="button" [disabled]="loading" (click)="useOtpInstead()" class="bj-auth-btn-secondary">
          Đăng nhập bằng OTP
        </button>

        <!-- Back -->
        <button type="button" [disabled]="loading" (click)="goBackToPhone()" class="bj-auth-btn-link">
          <span class="bj-auth-icon-xs" [innerHTML]="icons.ARROW_BACK | safeSvg"></span> Đổi số điện thoại
        </button>
      </form>

      <!-- ═══ STEP 2b: Nhập OTP ═══ -->
      <form *ngIf="step === 'otp'" (ngSubmit)="verifyOtp()" novalidate class="bj-auth-form" style="margin-top:1.25rem">

        <div class="bj-auth-field">
          <label class="bj-auth-label">Số điện thoại</label>
          <div class="bj-auth-input-wrapper bj-auth-input-readonly">
            <span class="bj-auth-input-icon" [innerHTML]="icons.PHONE | safeSvg"></span>
            <input type="tel" [value]="phone" readonly class="bj-auth-input" />
          </div>
        </div>

        <div class="bj-auth-field">
          <label class="bj-auth-label">Mã OTP (6 số)</label>
          <div class="bj-auth-input-wrapper" [class.bj-auth-input-error]="otpError">
            <span class="bj-auth-input-icon" [innerHTML]="icons.SHIELD_CHECK | safeSvg"></span>
            <input type="text" [(ngModel)]="otpCode" name="otpCode" (input)="onOtpInput()" maxlength="6"
              inputmode="numeric" autocomplete="one-time-code" placeholder="Nhập mã 6 số" class="bj-auth-input" />
          </div>
          <p *ngIf="otpError" class="bj-auth-error">{{ otpError }}</p>
        </div>

        <!-- Countdown & Resend -->
        <div class="bj-auth-otp-actions">
          <span class="bj-auth-text-muted flex justify-start">Hết hạn: {{ countdownDisplay }}</span>
          <button type="button" [disabled]="!canResendOtp" (click)="resendOtp()" class="bj-auth-btn-link">
            Gửi lại mã
          </button>
        </div>



        <!-- Submit -->
        <button type="submit" [disabled]="loading" class="bj-auth-btn-primary">
          <span *ngIf="!loading">XÁC NHẬN</span>
          <span *ngIf="loading" class="bj-auth-btn-loading">
            <svg class="animate-spin" width="18" height="18" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
            </svg>
            Đang xác thực...
          </span>
        </button>

        <!-- Back -->
        <button type="button" [disabled]="loading" (click)="goBackToPhone()" class="bj-auth-btn-link">
          <span class="bj-auth-icon-xs" [innerHTML]="icons.ARROW_BACK | safeSvg"></span> Đổi số điện thoại
        </button>
      </form>

      <!-- Divider (only on phone step) -->
      <!-- <div *ngIf="step === 'phone'" class="bj-auth-divider"><span>hoặc</span></div>

      <button *ngIf="step === 'phone'" type="button" [disabled]="isGoogleLoading || loading" (click)="loginWithGoogle()"
        class="bj-auth-btn-google">
        <span *ngIf="!isGoogleLoading" class="bj-auth-icon-google" [innerHTML]="icons.GOOGLE | safeSvg"></span>
        <svg *ngIf="isGoogleLoading" class="animate-spin" width="18" height="18" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
        </svg>
        <span>{{ isGoogleLoading ? 'Đang kết nối...' : 'Tiếp tục với Google' }}</span>
      </button> -->

      <!-- Footer -->
      <!-- <div class="bj-auth-footer-link">
        <p>Chưa có tài khoản?</p>
        <a routerLink="/bro-jet/register">Đăng ký ngay <span class="bj-auth-icon-xs" [innerHTML]="icons.ARROW_FORWARD | safeSvg"></span></a>
      </div> -->

      <!-- Back to home -->
      <div class="bj-auth-footer-link">
        <a routerLink="/bro-jet/home"><span class="bj-auth-icon-xs" [innerHTML]="icons.ARROW_BACK | safeSvg"></span> Quay về trang chủ</a>
      </div>
    </section>
  </main>

  <!-- Hidden: Firebase reCAPTCHA -->
  <div id="firebase-recaptcha-container" style="display:none;"></div>
</div>
