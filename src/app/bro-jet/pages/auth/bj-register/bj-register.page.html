<div class="bj-auth-page">
  <div class="bj-auth-bg-particles">
    <div class="bj-particle bj-particle-1"></div>
    <div class="bj-particle bj-particle-2"></div>
  </div>

  <main class="bj-auth-main">
    <!-- Brand -->
    <div class="bj-auth-brand">
      <div class="bj-auth-logo-wrapper">
        <div class="bj-auth-logo-glow"></div>
        <div class="bj-auth-logo-container">
          <img alt="BROJET" src="assets/images/logo_bro_jet.jpg" class="bj-auth-logo-img" />
        </div>
      </div>
      <h1 class="bj-auth-brand-name">BROJET</h1>
      <p class="bj-auth-brand-tagline">Tạo tài khoản mới</p>
    </div>

    <!-- Card -->
    <section class="bj-auth-card">
      <div class="bj-auth-card-glow"></div>

      <h2 class="bj-auth-card-title">Đăng ký</h2>
      <div class="bj-auth-card-title-bar"></div>

      <form [formGroup]="registerForm" (ngSubmit)="submitRegister()" novalidate class="bj-auth-form" style="margin-top:1.25rem">

        <!-- Full Name -->
        <div class="bj-auth-field">
          <label class="bj-auth-label">Họ và Tên <span class="bj-auth-label-required">*</span></label>
          <div class="bj-auth-input-wrapper" [class.bj-auth-input-error]="registerForm.get('full_name')?.invalid && registerForm.get('full_name')?.touched">
            <span class="bj-auth-input-icon" [innerHTML]="icons.PERSON | safeSvg"></span>
            <input type="text" formControlName="full_name" placeholder="Nguyễn Văn A"
              autocomplete="name" class="bj-auth-input" />
          </div>
          <p *ngIf="registerForm.get('full_name')?.invalid && registerForm.get('full_name')?.touched" class="bj-auth-error">
            Vui lòng nhập họ tên (ít nhất 2 ký tự)
          </p>
        </div>

        <!-- Phone -->
        <div class="bj-auth-field">
          <label class="bj-auth-label">Số điện thoại <span class="bj-auth-label-required">*</span></label>
          <div class="bj-auth-input-wrapper" [class.bj-auth-input-error]="registerForm.get('phone')?.invalid && registerForm.get('phone')?.touched">
            <span class="bj-auth-input-icon" [innerHTML]="icons.PHONE | safeSvg"></span>
            <input type="tel" formControlName="phone" placeholder="0971 xxx xxx"
              autocomplete="tel" class="bj-auth-input" />
          </div>
          <p *ngIf="registerForm.get('phone')?.invalid && registerForm.get('phone')?.touched" class="bj-auth-error">
            Số điện thoại không hợp lệ (VD: 0971424792)
          </p>
        </div>

        <!-- Email -->
        <div class="bj-auth-field">
          <label class="bj-auth-label">Email <span class="bj-auth-label-required">*</span></label>
          <div class="bj-auth-input-wrapper" [class.bj-auth-input-error]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
            <span class="bj-auth-input-icon" [innerHTML]="icons.EMAIL | safeSvg"></span>
            <input type="email" formControlName="email" placeholder="example@gmail.com"
              autocomplete="email" class="bj-auth-input" />
          </div>
          <p *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="bj-auth-error">
            Vui lòng nhập email hợp lệ
          </p>
        </div>

        <!-- Password -->
        <div class="bj-auth-field">
          <label class="bj-auth-label">Mật khẩu <span class="bj-auth-label-required">*</span></label>
          <div class="bj-auth-input-wrapper" [class.bj-auth-input-error]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
            <span class="bj-auth-input-icon" [innerHTML]="icons.LOCK | safeSvg"></span>
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
              placeholder="Ít nhất 8 ký tự" autocomplete="new-password" class="bj-auth-input bj-auth-input-password" />
            <button type="button" (click)="showPassword = !showPassword" class="bj-auth-toggle-password">
              <span class="bj-auth-icon-sm" [innerHTML]="(showPassword ? icons.EYE_OFF : icons.EYE) | safeSvg"></span>
            </button>
          </div>
          <p *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="bj-auth-error">
            Mật khẩu phải có ít nhất 8 ký tự
          </p>
        </div>

        <!-- Confirm Password -->
        <div class="bj-auth-field">
          <label class="bj-auth-label">Xác nhận mật khẩu <span class="bj-auth-label-required">*</span></label>
          <div class="bj-auth-input-wrapper" [class.bj-auth-input-error]="registerForm.get('password_confirmation')?.hasError('passwordMismatch') && registerForm.get('password_confirmation')?.touched">
            <span class="bj-auth-input-icon" [innerHTML]="icons.SHIELD_CHECK | safeSvg"></span>
            <input [type]="showConfirmPassword ? 'text' : 'password'" formControlName="password_confirmation"
              placeholder="Nhập lại mật khẩu" autocomplete="new-password" class="bj-auth-input bj-auth-input-password" />
            <button type="button" (click)="showConfirmPassword = !showConfirmPassword" class="bj-auth-toggle-password">
              <span class="bj-auth-icon-sm" [innerHTML]="(showConfirmPassword ? icons.EYE_OFF : icons.EYE) | safeSvg"></span>
            </button>
          </div>
          <p *ngIf="registerForm.get('password_confirmation')?.hasError('passwordMismatch') && registerForm.get('password_confirmation')?.touched" class="bj-auth-error">
            Mật khẩu xác nhận không khớp
          </p>
        </div>

        <!-- Terms -->
        <div class="bj-auth-terms">
          <input type="checkbox" id="terms" formControlName="terms" class="bj-auth-checkbox" />
          <label for="terms">
            Tôi đồng ý với <a routerLink="/bro-jet/terms">Điều khoản</a> &amp; <a routerLink="/bro-jet/privacy">Chính sách</a> của BROJET.
          </label>
        </div>



        <!-- Submit -->
        <button type="submit" [disabled]="registerForm.invalid || loading" class="bj-auth-btn-primary">
          <span *ngIf="!loading">ĐĂNG KÝ</span>
          <span *ngIf="loading" class="bj-auth-btn-loading">
            <svg class="animate-spin" width="18" height="18" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
            </svg>
            Đang xử lý...
          </span>
        </button>
      </form>

      <!-- Divider -->
      <!-- <div class="bj-auth-divider"><span>hoặc</span></div>

      <button type="button" [disabled]="isGoogleLoading || loading" (click)="registerWithGoogle()" class="bj-auth-btn-google">
        <span *ngIf="!isGoogleLoading" class="bj-auth-icon-google" [innerHTML]="icons.GOOGLE | safeSvg"></span>
        <svg *ngIf="isGoogleLoading" class="animate-spin" width="18" height="18" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
        </svg>
        <span>{{ isGoogleLoading ? 'Đang kết nối...' : 'Đăng ký với Google' }}</span>
      </button> -->

      <!-- Footer -->
      <div class="bj-auth-footer-link" style="flex-direction:row; gap:0.4rem; justify-content:center;">
        <p>Bạn đã có tài khoản?</p>
        <a routerLink="/bro-jet/login">Đăng nhập ngay <span class="bj-auth-icon-xs" [innerHTML]="icons.ARROW_FORWARD | safeSvg"></span></a>
      </div>
    </section>
  </main>
</div>
