<div class="bj-auth-page">
  <div class="bj-auth-bg-particles">
    <div class="bj-particle bj-particle-1"></div>
    <div class="bj-particle bj-particle-2"></div>
  </div>

  <main class="bj-auth-main">
    <!-- Brand -->
    <div class="bj-auth-brand">
      <!-- <div class="bj-auth-logo-wrapper">
        <div class="bj-auth-logo-glow"></div>
        <div class="bj-auth-logo-container">
          <img alt="BROJET" src="assets/images/logo_bro_jet.jpg" class="bj-auth-logo-img" />
        </div>
      </div> -->
      <h1 class="bj-auth-brand-name">BROJET</h1>
      <p class="bj-auth-brand-tagline">Thiết lập hồ sơ</p>
    </div>

    <!-- Card -->
    <section class="bj-auth-card">
      <div class="bj-auth-card-glow"></div>

      <h2 class="bj-auth-card-title">Hoàn tất thông tin</h2>
      <div class="bj-auth-card-title-bar"></div>

      <!-- Avatar -->
      <div class="bj-auth-avatar-section">
        <input #avatarInput type="file" accept="image/png,image/jpeg,image/webp" class="bj-auth-avatar-input" (change)="onAvatarFileChange($event)" />
        <button type="button" (click)="triggerAvatarInput(avatarInput)" [disabled]="isUploadingAvatar || isSaving" class="bj-auth-avatar-btn">
          <img [src]="avatarPreview" alt="Avatar" class="bj-auth-avatar-img" />
          <span class="bj-auth-avatar-overlay">
            {{ isUploadingAvatar ? 'Đang tải...' : 'Tải ảnh' }}
          </span>
        </button>
        <p *ngIf="selectedAvatarName" class="bj-auth-avatar-name">{{ selectedAvatarName }}</p>
        <p class="bj-auth-avatar-hint">Ảnh đại diện là tùy chọn, bạn có thể bỏ qua.</p>
      </div>

      <form (ngSubmit)="submitProfile()" novalidate class="bj-auth-form" style="margin-top:1.25rem">

        <!-- Full Name -->
        <div class="bj-auth-field">
          <label class="bj-auth-label">Họ và Tên <span class="bj-auth-label-required">*</span></label>
          <div class="bj-auth-input-wrapper">
            <span class="bj-auth-input-icon" [innerHTML]="icons.PERSON | safeSvg"></span>
            <input type="text" [(ngModel)]="fullName" name="fullName" placeholder="Nguyễn Văn A"
              autocomplete="name" class="bj-auth-input" />
          </div>
        </div>

        <!-- Email (optional) -->
        <div class="bj-auth-field">
          <label class="bj-auth-label">Email</label>
          <div class="bj-auth-input-wrapper">
            <span class="bj-auth-input-icon" [innerHTML]="icons.EMAIL | safeSvg"></span>
            <input type="email" [(ngModel)]="email" name="email" placeholder="example@gmail.com"
              autocomplete="email" class="bj-auth-input" />
          </div>
        </div>

        <!-- Password -->
        <div class="bj-auth-field">
          <label class="bj-auth-label">Mật khẩu <span class="bj-auth-label-required">*</span></label>
          <div class="bj-auth-input-wrapper">
            <span class="bj-auth-input-icon" [innerHTML]="icons.LOCK | safeSvg"></span>
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password"
              placeholder="Tối thiểu 8 ký tự" autocomplete="new-password" class="bj-auth-input bj-auth-input-password" />
            <button type="button" (click)="showPassword = !showPassword" class="bj-auth-toggle-password">
              <span class="bj-auth-icon-sm" [innerHTML]="(showPassword ? icons.EYE_OFF : icons.EYE) | safeSvg"></span>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="bj-auth-field">
          <label class="bj-auth-label">Xác nhận mật khẩu <span class="bj-auth-label-required">*</span></label>
          <div class="bj-auth-input-wrapper">
            <span class="bj-auth-input-icon" [innerHTML]="icons.SHIELD_CHECK | safeSvg"></span>
            <input [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword" name="confirmPassword"
              placeholder="Nhập lại mật khẩu" autocomplete="new-password" class="bj-auth-input bj-auth-input-password" />
            <button type="button" (click)="showConfirmPassword = !showConfirmPassword" class="bj-auth-toggle-password">
              <span class="bj-auth-icon-sm" [innerHTML]="(showConfirmPassword ? icons.EYE_OFF : icons.EYE) | safeSvg"></span>
            </button>
          </div>
        </div>

        <!-- Terms -->
        <div class="bj-auth-terms">
          <input type="checkbox" id="agreeTerms" [(ngModel)]="agreeTerms" name="agreeTerms" class="bj-auth-checkbox" />
          <label for="agreeTerms">
            Tôi đã đọc và đồng ý với <a routerLink="/bro-jet/terms">Điều khoản</a> &amp; <a routerLink="/bro-jet/privacy">Chính sách</a> của BROJET.
          </label>
        </div>

        <!-- Error / Info -->
        <p *ngIf="errorMsg" class="bj-auth-error-global">{{ errorMsg }}</p>
        <p *ngIf="infoMsg" class="bj-auth-success-global">{{ infoMsg }}</p>

        <!-- Submit -->
        <button type="submit" [disabled]="isSaving || isUploadingAvatar || !agreeTerms" class="bj-auth-btn-primary">
          <span *ngIf="!isSaving">LƯU VÀ TIẾP TỤC</span>
          <span *ngIf="isSaving" class="bj-auth-btn-loading">
            <svg class="animate-spin" width="18" height="18" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
            </svg>
            Đang lưu...
          </span>
        </button>
      </form>
    </section>
  </main>
</div>
