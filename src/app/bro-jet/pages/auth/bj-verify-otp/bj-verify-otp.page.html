<div class="bj-auth-page">
  <div class="bj-auth-bg-particles">
    <div class="bj-particle bj-particle-1"></div>
    <div class="bj-particle bj-particle-2"></div>
  </div>

  <main class="bj-auth-main">
    <!-- Brand -->
    <div class="bj-auth-brand">
      <div class="bj-auth-logo-wrapper">
        <div class="bj-auth-logo-glow"></div>
        <div class="bj-auth-logo-container">
          <img alt="BROJET" src="assets/images/logo_bro_jet.jpg" class="bj-auth-logo-img" />
        </div>
      </div>
      <h1 class="bj-auth-brand-name">BROJET</h1>
      <p class="bj-auth-brand-tagline">Xác thực tài khoản</p>
    </div>

    <!-- OTP Card -->
    <section class="bj-auth-card">
      <div class="bj-auth-card-glow"></div>

      <h2 class="bj-auth-card-title">Nhập mã OTP</h2>
      <div class="bj-auth-card-title-bar"></div>

      <!-- Phone info -->
      <div class="bj-otp-phone-info">
        <span class="bj-auth-icon-sm" [innerHTML]="icons.PHONE | safeSvg"></span>
        <span>Mã đã gửi đến <strong>{{ phone }}</strong></span>
      </div>

      <!-- OTP Input -->
      <div class="bj-auth-form" style="margin-top:1.25rem">
        <div class="bj-auth-field">
          <label class="bj-auth-label">Mã xác thực (6 số)</label>
          <div class="bj-auth-input-wrapper" [class.bj-auth-input-error]="otpError">
            <span class="bj-auth-input-icon" [innerHTML]="icons.KEY | safeSvg"></span>
            <input type="text" [(ngModel)]="otpCode" (input)="onOtpInput()"
              maxlength="6" inputmode="numeric" autocomplete="one-time-code"
              placeholder="000000" class="bj-auth-input bj-otp-input" />
          </div>
          <p *ngIf="otpError" class="bj-auth-error">{{ otpError }}</p>
        </div>

        <!-- Countdown & Resend -->
        <div class="bj-otp-timer">
          <span *ngIf="countdown > 0">Hết hạn sau: <strong>{{ countdownDisplay }}</strong></span>
          <button *ngIf="canResend" type="button" (click)="resendOtp()" class="bj-otp-resend-btn">
            Gửi lại mã
          </button>
        </div>



        <!-- Verify button -->
        <button type="button" [disabled]="loading || otpCode.length < 6" (click)="verifyOtp()" class="bj-auth-btn-primary">
          <span *ngIf="!loading">XÁC NHẬN</span>
          <span *ngIf="loading" class="bj-auth-btn-loading">
            <svg class="animate-spin" width="18" height="18" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
            </svg>
            Đang xác thực...
          </span>
        </button>

        <!-- Back -->
        <button type="button" (click)="goBack()" class="bj-auth-btn-secondary">
          <span class="bj-auth-icon-xs" [innerHTML]="icons.ARROW_BACK | safeSvg"></span>
          Quay lại
        </button>
      </div>
    </section>

    <!-- Hidden recaptcha container -->
    <div id="bj-recaptcha-container" style="display:none;"></div>
  </main>
</div>
