<!-- Tab bar -->
<div class="bg-white border-b border-slate-100 sticky top-0 z-10">
  <div class="flex px-4 gap-6 overflow-x-auto scrollbar-hide">
    <div *ngFor="let tab of tabs; let i = index"
      (click)="onTabClick(i)"
      class="flex flex-col items-center justify-center border-b-[3px] py-3.5 cursor-pointer transition-all whitespace-nowrap"
      [ngClass]="activeTab === tab.value ? 'border-emerald-500 text-emerald-600' : 'border-transparent text-slate-400'">
      <p class="text-sm font-bold">{{ tab.label }}</p>
    </div>
  </div>
</div>

<!-- Search Bar -->
<div class="bg-white px-4 py-3">
  <div class="flex w-full items-stretch rounded-xl h-11 bg-slate-50 border border-slate-200/60">
    <div class="text-slate-400 flex items-center justify-center pl-4">
      <span class="w-5 h-5" [innerHTML]="searchIcon"></span>
    </div>
    <input
      (input)="onSearch($event)"
      [value]="searchQuery"
      class="flex w-full min-w-0 flex-1 bg-transparent border-none outline-none ring-0 text-slate-900 px-3 text-sm font-medium placeholder:text-slate-400"
      placeholder="Tìm kiếm mã hóa đơn, biển số..."/>
  </div>
</div>

<!-- Swiper Content -->
<swiper-container #swiperEl
  [attr.initial-slide]="activeSlideIndex"
  slides-per-view="1"
  speed="300"
  css-mode="false"
  class="flex-1 h-full"
  (swiperslidechange)="onSlideChange($event)">

  <swiper-slide *ngFor="let tab of tabs; let i = index" class="h-full overflow-y-auto">
    <ion-content>
      <!-- Pull to refresh -->
      <ion-refresher slot="fixed" (ionRefresh)="onRefresh($event)">
        <ion-refresher-content></ion-refresher-content>
      </ion-refresher>

      <!-- Loading skeleton -->
      <div *ngIf="isLoading && getTabBookings(tab.value).length === 0" class="flex flex-col gap-3 px-4 py-4">
        <div *ngFor="let item of [1,2,3]" class="h-32 bg-slate-50 rounded-2xl animate-pulse"></div>
      </div>

      <!-- Booking list grouped by month -->
      <div *ngIf="!isLoading || getTabBookings(tab.value).length > 0" class="pb-6">
        <div *ngFor="let group of getTabGroupedBookings(tab.value)">
          <h3 class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em] px-5 pb-2 pt-5 opacity-70">
            {{ group.month }}
          </h3>
          <div class="px-4 flex flex-col gap-4">
            <app-bj-booking-card
              *ngFor="let booking of group.items"
              [booking]="booking"
              (detailClick)="onDetailClick($event)"
              (cancelClick)="onCancelClick($event)">
            </app-bj-booking-card>
          </div>
        </div>
      </div>

      <!-- Empty state -->
      <app-bj-empty-state *ngIf="!isLoading && getTabBookings(tab.value).length === 0"
        [icon]="emptyIcon"
        title="Chưa có lịch đặt xe"
        description="Bạn chưa có lịch đặt xe nào. Hãy đặt lịch ngay để trải nghiệm dịch vụ rửa xe tự động!"
        ctaLabel="Đặt lịch ngay"
        (ctaClick)="onExploreClick()">
      </app-bj-empty-state>

      <!-- Infinite scroll -->
      <ion-infinite-scroll (ionInfinite)="onInfiniteScroll($event)">
        <ion-infinite-scroll-content loadingSpinner="crescent" loadingText="Đang tải thêm..."></ion-infinite-scroll-content>
      </ion-infinite-scroll>
    </ion-content>
  </swiper-slide>

</swiper-container>
