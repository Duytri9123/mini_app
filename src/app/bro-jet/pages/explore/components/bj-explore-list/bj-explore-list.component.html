<div *ngIf="loading" class="flex items-center justify-center py-12">
  <div class="animate-spin rounded-full h-8 w-8 border-2 border-slate-200 border-t-primary"></div>
</div>

<div *ngIf="!loading && stations.length > 0" class="space-y-4">
  <div *ngFor="let station of stations" (click)="onCardClick(station)">
    <app-bj-station-card
      [station]="station"
      [showBookButton]="true"
      [hasGpsPermission]="hasGpsPermission"
      (cardClick)="onCardClick($event)"
      (bookClick)="onBookClick($event)"
    />
  </div>
</div>

<div *ngIf="!loading && stations.length === 0" class="flex flex-col items-center justify-center py-16 px-6 text-center">
  <div class="w-16 h-16 mb-4 text-slate-300 dark:text-slate-600">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
    </svg>
  </div>
  <p class="text-sm font-bold text-slate-900 dark:text-slate-100 mb-1">Không có trạm nào quanh đây</p>
  <p class="text-[13px] text-slate-500 dark:text-slate-400">Khu vực này hiện chưa có trạm nào. Bạn thử thay đổi vị trí hoặc bộ lọc xem sao nhé.</p>
</div>
