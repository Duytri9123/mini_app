<ion-content class="bg-white">
  <!-- Loading skeleton -->
  <div *ngIf="loading" class="animate-pulse">
    <div class="w-full h-56 bg-slate-200"></div>
    <div class="px-5 py-6 space-y-3">
      <div class="h-3 bg-slate-200 rounded w-1/4"></div>
      <div class="h-6 bg-slate-200 rounded w-3/4"></div>
      <div class="h-4 bg-slate-200 rounded w-full"></div>
      <div class="h-4 bg-slate-200 rounded w-full"></div>
      <div class="h-4 bg-slate-200 rounded w-2/3"></div>
    </div>
  </div>

  <!-- Error state -->
  <div *ngIf="!loading && error" class="flex flex-col items-center justify-center py-20 px-6">
    <div class="w-16 h-16 mb-4 bg-red-50 rounded-full flex items-center justify-center">
      <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>
      </svg>
    </div>
    <p class="text-base font-bold text-slate-700 mb-1">Không tìm thấy bài viết</p>
    <p class="text-sm text-slate-400">Bài viết có thể đã bị xóa hoặc không tồn tại.</p>
  </div>

  <!-- Article content -->
  <div *ngIf="!loading && !error && article">
    <!-- Hero image -->
    <div class="relative w-full aspect-[16/9] overflow-hidden" *ngIf="article.thumbnail_url">
      <img
        [src]="getImageUrl(article.thumbnail_url)"
        [alt]="article.title"
        (error)="handleImageError($event)"
        class="w-full h-full object-cover" />
      <!-- Gradient overlay -->
      <div class="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent"></div>
    </div>

    <!-- Article body -->
    <div class="px-5 py-5">
      <!-- Category & date -->
      <div class="flex items-center gap-2 mb-3">
        <span
          *ngIf="article.category"
          class="px-2.5 py-1 bg-primary/10 text-primary text-[10px] font-bold uppercase rounded-full">
          {{ article.category.name }}
        </span>
        <span class="text-[11px] text-slate-400 font-medium">
          {{ formatDate(article.published_at || article.created_at) }}
        </span>
      </div>

      <!-- Title -->
      <h1 class="text-xl font-extrabold text-slate-900 leading-tight mb-3">
        {{ article.title }}
      </h1>

      <!-- Excerpt -->
      <p *ngIf="article.excerpt" class="text-sm text-slate-500 leading-relaxed mb-5 border-l-3 border-primary/30 pl-3 italic">
        {{ article.excerpt }}
      </p>

      <!-- HTML Content -->
      <div
        class="bj-article-content prose prose-sm max-w-none text-slate-700"
        [innerHTML]="article.content">
      </div>
    </div>

    <!-- Bottom padding for safe area -->
    <div class="h-8"></div>
  </div>
</ion-content>
