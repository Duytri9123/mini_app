<ion-content class="bg-[#F8FBFF]">
  <div class="px-4 pt-4 pb-2">
    <!-- Search bar -->
    <div class="relative mb-4">
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input
        type="text"
        placeholder="Tìm kiếm bài viết..."
        class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-full text-sm text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"
        [value]="searchQuery"
        (input)="onSearchInput($event)" />
    </div>

    <!-- Category filter chips -->
    <div class="flex gap-2 overflow-x-auto pb-3 scrollbar-hide -mx-4 px-4" *ngIf="categories.length > 0">
      <button
        (click)="selectCategory(null)"
        class="flex-shrink-0 px-3.5 py-1.5 rounded-full text-xs font-bold transition-all"
        [class]="selectedCategoryId === null
          ? 'bg-gradient-to-r from-cyan-500 to-emerald-500 text-white shadow-sm'
          : 'bg-white text-slate-600 border border-slate-200'">
        Tất cả
      </button>
      <button
        *ngFor="let cat of categories"
        (click)="selectCategory(+cat.id)"
        class="flex-shrink-0 px-3.5 py-1.5 rounded-full text-xs font-bold transition-all"
        [class]="selectedCategoryId === +cat.id
          ? 'bg-gradient-to-r from-cyan-500 to-emerald-500 text-white shadow-sm'
          : 'bg-white text-slate-600 border border-slate-200'">
        {{ cat.name }}
      </button>
    </div>
  </div>

  <!-- Loading skeleton -->
  <div *ngIf="loading" class="px-4 space-y-4">
    <div *ngFor="let i of [1,2,3]" class="bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100 animate-pulse">
      <div class="h-44 bg-slate-200"></div>
      <div class="p-4 space-y-2">
        <div class="h-3 bg-slate-200 rounded w-1/4"></div>
        <div class="h-4 bg-slate-200 rounded w-3/4"></div>
        <div class="h-3 bg-slate-200 rounded w-full"></div>
      </div>
    </div>
  </div>

  <!-- Articles list -->
  <div *ngIf="!loading" class="px-4 pb-6 space-y-4">
    <div
      *ngFor="let article of articles"
      (click)="viewDetail(article)"
      class="bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100 transition-transform active:scale-[0.98] cursor-pointer">
      <!-- Thumbnail -->
      <div class="h-44 w-full overflow-hidden" *ngIf="article.thumbnail_url">
        <img
          [src]="getImageUrl(article.thumbnail_url)"
          [alt]="article.title"
          (error)="handleImageError($event)"
          class="w-full h-full object-cover" />
      </div>
      <!-- Content -->
      <div class="p-4">
        <div class="flex items-center gap-2 mb-2">
          <span
            *ngIf="article.category"
            class="px-2 py-0.5 bg-primary/10 text-primary text-[10px] font-bold uppercase rounded-md">
            {{ article.category.name }}
          </span>
          <span class="text-[11px] text-slate-400 font-medium">
            {{ formatDate(article.published_at || article.created_at) }}
          </span>
        </div>
        <h2 class="text-base font-bold text-slate-900 leading-tight mb-2">{{ article.title }}</h2>
        <p *ngIf="article.excerpt" class="text-sm text-slate-500 line-clamp-2 leading-relaxed">{{ article.excerpt }}</p>
      </div>
    </div>

    <!-- Empty state -->
    <div *ngIf="articles.length === 0" class="text-center py-16">
      <div class="w-16 h-16 mx-auto mb-4 bg-slate-100 rounded-full flex items-center justify-center">
        <svg class="w-8 h-8 text-slate-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m5.231 13.481L15 17.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v16.5c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Zm3.75 11.625a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"/>
        </svg>
      </div>
      <p class="text-sm text-slate-400 font-medium">Không tìm thấy bài viết nào</p>
      <p class="text-xs text-slate-300 mt-1">Thử thay đổi bộ lọc hoặc từ khóa tìm kiếm</p>
    </div>
  </div>

  <!-- Infinite scroll -->
  <ion-infinite-scroll
    *ngIf="meta?.has_more"
    (ionInfinite)="loadMore($event)">
    <ion-infinite-scroll-content loadingSpinner="crescent" loadingText="Đang tải thêm...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
