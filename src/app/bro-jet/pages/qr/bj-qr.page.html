<ion-content style="--background: #f8fffe">
  <div class="max-w-md mx-auto px-4 pt-6">

    <!-- Custom Segment Toggle -->
    <div class="flex bg-gray-100 rounded-full p-1 mb-6">
      <button
        (click)="switchTab('scan')"
        class="flex-1 py-2.5 text-sm font-bold rounded-full transition-all duration-200"
        [class]="activeSegment === 'scan'
          ? 'bg-gradient-to-r from-cyan-500 to-emerald-500 text-white shadow-lg shadow-cyan-200/50'
          : 'text-gray-500 hover:text-gray-700'"
      >
        Quét QR
      </button>
      <button
        (click)="switchTab('my-qr')"
        class="flex-1 py-2.5 text-sm font-bold rounded-full transition-all duration-200"
        [class]="activeSegment === 'my-qr'
          ? 'bg-gradient-to-r from-cyan-500 to-emerald-500 text-white shadow-lg shadow-cyan-200/50'
          : 'text-gray-500 hover:text-gray-700'"
      >
        QR của tôi
      </button>
    </div>

    <!-- My QR Tab -->
    <div *ngIf="activeSegment === 'my-qr'" class="flex flex-col items-center">
      <div class="bg-white rounded-2xl shadow-lg shadow-emerald-100/50 p-6 w-full max-w-[300px] border border-slate-100">
        <!-- User info -->
        <div *ngIf="user" class="text-center mb-4">
          <p class="text-lg font-black text-[#1a1a1a]">{{ user.fullName }}</p>
          <p class="text-sm text-[#6b7280]">{{ user.phone }}</p>
        </div>

        <!-- QR Code -->
        <div class="flex justify-center">
          <qrcode
            [qrdata]="qrData"
            [width]="220"
            [errorCorrectionLevel]="'M'"
            [margin]="2"
            [colorDark]="'#1a1a2e'"
            [colorLight]="'#ffffff'"
          ></qrcode>
        </div>

        <p class="text-center text-xs text-[#6b7280] mt-4">
          Đưa mã QR này cho nhân viên để xác nhận
        </p>
      </div>

      <p class="text-center text-sm text-[#374151] mt-6 px-4">
        Mã QR chứa thông tin tài khoản của bạn.<br>
        Sử dụng khi check-in tại trạm BRO JET.
      </p>
    </div>

    <!-- Scan QR Tab -->
    <div *ngIf="activeSegment === 'scan'" class="flex flex-col items-center">
      <div class="relative w-full max-w-[320px] aspect-square rounded-2xl overflow-hidden bg-black shadow-lg shadow-emerald-200/20">
        <!-- Camera view -->
        <video
          #videoEl
          [hidden]="!scanning"
          class="w-full h-full object-cover"
          playsinline
          autoplay
          muted
        ></video>

        <!-- Scan overlay -->
        <div *ngIf="scanning" class="absolute inset-0 flex items-center justify-center">
          <div class="w-56 h-56 border-2 border-white/60 rounded-xl relative">
            <span class="absolute top-0 left-0 w-6 h-6 border-t-4 border-l-4 border-emerald-400 rounded-tl-lg"></span>
            <span class="absolute top-0 right-0 w-6 h-6 border-t-4 border-r-4 border-emerald-400 rounded-tr-lg"></span>
            <span class="absolute bottom-0 left-0 w-6 h-6 border-b-4 border-l-4 border-emerald-400 rounded-bl-lg"></span>
            <span class="absolute bottom-0 right-0 w-6 h-6 border-b-4 border-r-4 border-emerald-400 rounded-br-lg"></span>
            <div class="absolute left-2 right-2 h-0.5 bg-gradient-to-r from-transparent via-emerald-400 to-transparent animate-scan"></div>
          </div>
        </div>

        <!-- Not scanning placeholder -->
        <div *ngIf="!scanning" class="w-full h-full flex items-center justify-center bg-gray-900">
          <div class="text-center text-white/60">
            <span class="w-12 h-12 mx-auto block text-white/50" [innerHTML]="qrIcon"></span>
            <p class="text-sm mt-2">Nhấn để bắt đầu quét</p>
          </div>
        </div>
      </div>

      <!-- Scan result -->
      <div *ngIf="scanResult" class="mt-4 w-full p-4 bg-emerald-50 border border-emerald-200 rounded-xl">
        <p class="text-sm font-medium text-emerald-800">Kết quả:</p>
        <p class="text-sm text-emerald-700 mt-1 break-all">{{ scanResult }}</p>
      </div>

      <p class="text-center text-sm text-[#6b7280] mt-4 px-4">
        Hướng camera vào mã QR để quét
      </p>

      <!-- Start/Stop button -->
      <button
        *ngIf="!scanning"
        (click)="startScanner()"
        class="mt-4 w-full max-w-[300px] px-5 py-3 text-sm font-bold rounded-full bg-gradient-to-r from-cyan-500 to-emerald-500 text-white hover:from-cyan-600 hover:to-emerald-600 shadow-lg shadow-cyan-200/50 transition-all"
      >
        Bắt đầu quét
      </button>
      <button
        *ngIf="scanning"
        (click)="stopScanner()"
        class="mt-4 w-full max-w-[300px] px-5 py-3 text-sm font-bold rounded-full border-2 border-cyan-500 text-cyan-600 hover:bg-cyan-50 transition-colors"
      >
        Dừng quét
      </button>
    </div>
  </div>
</ion-content>
