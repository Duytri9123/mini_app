<section class="py-8" *ngIf="loading || articles.length > 0">
  <!-- Header -->
  <div class="px-4 flex justify-between items-end mb-5">
    <div>
      <h2 class="text-lg font-extrabold tracking-tight">Bài Viết</h2>
    </div>
    <button class="text-primary font-bold text-sm" (click)="viewAll()">Xem tất cả</button>
  </div>

  <!-- Loading skeleton -->
  <ng-container *ngIf="loading">
    <div class="px-4 mb-4">
      <div class="rounded-2xl overflow-hidden bg-white shadow-sm border border-slate-100 animate-pulse">
        <div class="aspect-[16/8] bg-slate-200"></div>
        <div class="p-4 space-y-2">
          <div class="h-4 bg-slate-200 rounded w-3/4"></div>
          <div class="h-3 bg-slate-200 rounded w-full"></div>
          <div class="h-3 bg-slate-200 rounded w-1/2"></div>
        </div>
      </div>
    </div>
  </ng-container>

  <!-- Featured Article (first) -->
  <div class="px-4 mb-4" *ngIf="!loading && articles.length > 0">
    <div
      class="rounded-2xl overflow-hidden bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 active:scale-[0.98] transition-all cursor-pointer"
      (click)="viewDetail(articles[0])">
      <!-- Image -->
      <div class="relative aspect-[16/8] overflow-hidden">
        <img
          [src]="getImageUrl(articles[0].thumbnail_url)"
          [alt]="articles[0].title"
          (error)="handleImageError($event)"
          class="w-full h-full object-cover" />
        <!-- Category badge -->
        <span
          *ngIf="articles[0].category"
          class="absolute top-3 left-3 bg-primary text-white text-[10px] font-extrabold uppercase tracking-wider px-2.5 py-1 rounded-full">
          {{ articles[0].category.name }}
        </span>
      </div>
      <!-- Content -->
      <div class="p-4">
        <h3 class="text-base font-bold text-slate-800 dark:text-slate-100 leading-snug mb-1.5">
          {{ articles[0].title }}
        </h3>
        <p class="text-xs text-slate-500 dark:text-slate-400 line-clamp-2 leading-relaxed mb-3">
          {{ articles[0].excerpt }}
        </p>
        <div class="flex items-center gap-3 text-[11px] text-slate-400">
          <span>{{ formatDate(articles[0].published_at || articles[0].created_at) }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Remaining Articles (horizontal scroll) -->
  <div class="flex gap-3 px-4 overflow-x-auto pb-2 scrollbar-hide" *ngIf="!loading && articles.length > 1">
    <div
      *ngFor="let article of articles.slice(1)"
      (click)="viewDetail(article)"
      class="min-w-[220px] max-w-[220px] rounded-2xl overflow-hidden bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 flex-shrink-0 active:scale-[0.98] transition-all cursor-pointer">
      <!-- Image -->
      <div class="relative aspect-[16/9] overflow-hidden">
        <img
          [src]="getImageUrl(article.thumbnail_url)"
          [alt]="article.title"
          (error)="handleImageError($event)"
          class="w-full h-full object-cover" />
        <span
          *ngIf="article.category"
          class="absolute top-2 left-2 bg-primary text-white text-[9px] font-extrabold uppercase tracking-wider px-2 py-0.5 rounded-full">
          {{ article.category.name }}
        </span>
      </div>
      <!-- Content -->
      <div class="p-3">
        <h3 class="text-xs font-bold text-slate-800 dark:text-slate-100 leading-snug mb-1 line-clamp-2">
          {{ article.title }}
        </h3>
        <div class="flex items-center gap-2 text-[10px] text-slate-400 mt-2">
          <span>{{ formatDate(article.published_at || article.created_at) }}</span>
        </div>
      </div>
    </div>
  </div>

</section>
