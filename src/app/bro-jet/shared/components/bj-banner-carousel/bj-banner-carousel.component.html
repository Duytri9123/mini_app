<ng-container *ngIf="banners; else loadingBanners">
  <swiper-container *ngIf="banners.length > 0; else emptyBanners" slides-per-view="1.05" space-between="0"
    centered-slides="true" grab-cursor="true" loop="true" pagination="true" pagination-clickable="true"
    autoplay-delay="5000" autoplay-pause-on-mouse-enter="true" autoplay-disable-on-interaction="false"
    class="bj-banner-swiper w-full" style="padding-bottom: 8px;">

    <swiper-slide *ngFor="let banner of banners" class="py-2">
      <div
        class="mx-1 aspect-[16/9] sm:aspect-[16/8.5] rounded-[2rem] relative overflow-hidden shadow-xl shadow-black/5 border border-white/10">

        <!-- Background image -->
        <img *ngIf="banner.image_url" [src]="banner.image_url" [alt]="banner.title"
          class="absolute inset-0 w-full h-full object-cover transform scale-105" />

        <!-- Fallback nếu không có ảnh -->
        <div *ngIf="!banner.image_url" class="absolute inset-0 bg-primary/90">
          <span class="absolute -right-8 -bottom-8 material-symbols-outlined text-[140px] text-white/10">
            local_car_wash
          </span>
        </div>

        <!-- Overlay gradient: More sophisticated multi-layer gradient -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-transparent"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-black/40 via-transparent to-transparent"></div>

        <!-- Content -->
        <div class="absolute inset-0 z-10 flex flex-col justify-between p-4">

          <!-- Top: badges -->
          <div class="flex flex-wrap gap-2">
            <span *ngFor="let badge of banner.badges"
              class="bg-white/20 backdrop-blur-md px-3 py-1.5 rounded-full text-[10px] font-extrabold uppercase tracking-wider text-white border border-white/30 shadow-sm">
              {{ badge }}
            </span>
          </div>

          <!-- Bottom: title + desc + CTA -->
          <div class="flex flex-col gap-3 mb-2">
            <div class="space-y-1.5">
              <h2 class="text-xl font-black text-white leading-tight tracking-tight drop-shadow-md">{{ banner.title }}
              </h2>
              <p *ngIf="banner.description || banner.desc"
                class="text-xs text-white/90 line-clamp-2 max-w-[85%] leading-relaxed font-medium">
                {{ banner.description || banner.desc }}
              </p>
            </div>

            <!-- <a [href]="banner.link || banner.btn?.link || banner.button?.link || '/home'"
              class="w-fit flex items-center gap-2 bg-white text-primary px-5 py-2.5 rounded-2xl text-[13px] font-bold shadow-lg shadow-black/10 active:scale-95 transition-all">
              <span>{{ banner.button_text || banner.btn?.text || banner.button?.text || 'Khám phá ngay' }}</span>
              <span class="material-symbols-outlined text-[18px]">arrow_right_alt</span>
            </a> -->
          </div>
        </div>

      </div>
    </swiper-slide>
  </swiper-container>

  <!-- Empty state -->
  <ng-template #emptyBanners>
    <div
      class="mx-4 aspect-[16/8.5] rounded-[2rem] bg-slate-50 dark:bg-slate-900/50 flex flex-col items-center justify-center border-2 border-dashed border-slate-200 dark:border-slate-800 gap-3">
      <span class="material-symbols-outlined text-4xl text-slate-300">auto_awesome_motion</span>
      <p class="text-sm font-medium text-slate-400">Không có ưu đãi nào hiện tại</p>
    </div>
  </ng-template>

</ng-container>

<!-- Skeleton loading -->
<ng-template #loadingBanners>
  <div class="flex gap-4 px-4 pb-8 overflow-hidden">
    <div *ngFor="let s of [1, 2]"
      class="min-w-[90%] aspect-[16/8.5] rounded-[2rem] bg-slate-100 dark:bg-slate-800 animate-pulse flex-shrink-0 p-8 flex flex-col justify-end">
      <div class="space-y-3">
        <div class="h-8 w-2/3 bg-slate-200 dark:bg-slate-700 rounded-xl"></div>
        <div class="h-4 w-1/2 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
        <div class="h-10 w-32 bg-slate-200 dark:bg-slate-700 rounded-2xl mt-4"></div>
      </div>
    </div>
  </div>
</ng-template>
