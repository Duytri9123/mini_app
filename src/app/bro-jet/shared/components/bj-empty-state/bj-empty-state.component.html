<div class="flex flex-col items-center justify-center px-6 text-center">
  <!-- Icon -->
  <div *ngIf="icon" class="w-16 h-16 text-gray-300 mb-4" [innerHTML]="icon"></div>

  <!-- Title -->
  <h3 class="text-base font-semibold text-gray-700 mb-1">{{ title }}</h3>

  <!-- Description -->
  <p class="text-sm text-gray-400 max-w-xs">{{ description }}</p>

  <!-- CTA button -->
  <button *ngIf="ctaLabel" (click)="onCtaClick()"
    class="mt-5 bg-gradient-to-r from-cyan-500 to-emerald-500 text-white text-sm font-medium px-6 py-2.5 rounded-xl hover:from-cyan-600 hover:to-emerald-600 transition-all">
    {{ ctaLabel }}
  </button>
</div>
