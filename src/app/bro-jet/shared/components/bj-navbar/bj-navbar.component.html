<div class="z-10 bg-white dark:bg-slate-900">
  <div class="flex gap-8 overflow-x-auto border-b border-slate-100 px-4 dark:border-slate-800">
    <button
      *ngFor="let item of items"
      type="button"
      (click)="selectItem(item.key)"
      class="flex shrink-0 flex-col items-center justify-center border-b-2 pb-3 pt-4 transition-colors"
      [ngClass]="
        activeKey === item.key
          ? 'border-primary text-primary'
          : 'border-transparent text-slate-500 dark:text-slate-400'
      "
    >
      <p class="text-sm" [ngClass]="activeKey === item.key ? 'font-bold' : 'font-medium'">{{ item.label }}</p>
    </button>
  </div>
</div>
