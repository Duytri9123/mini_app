<div
  (click)="handleClick()"
  class="flex items-start gap-3 p-4 cursor-pointer transition-colors hover:bg-zinc-50 active:bg-zinc-100 border-b border-zinc-100"
  [ngClass]="{ 'bg-red-50/50': !notification.is_read }"
>
  <div class="w-10 h-10 rounded-full bg-zinc-100 flex items-center justify-center flex-shrink-0 text-xl shadow-sm">
    {{ getIcon() }}
  </div>
  <div class="flex-1 min-w-0">
    <div class="flex justify-between items-start mb-0.5">
      <h4 class="text-sm truncate text-zinc-800" [ngClass]="{ 'font-bold': !notification.is_read, 'font-semibold': notification.is_read }">
        {{ notification.title }}
      </h4>
      <span class="text-[10px] text-zinc-400 flex-shrink-0 ml-2">
        {{ notification.created_at_human || formatTime(notification.created_at) }}
      </span>
    </div>
    <p class="text-xs text-zinc-500 leading-snug line-clamp-2">
      {{ notification.message }}
    </p>
  </div>
  <div *ngIf="!notification.is_read" class="w-2 h-2 bg-primary rounded-full mt-1.5 flex-shrink-0"></div>
</div>
