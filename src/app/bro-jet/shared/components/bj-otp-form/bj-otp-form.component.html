<button
  type="button"
  (click)="back.emit()"
  class="flex items-center gap-1 text-sm text-gray-500 hover:text-gray-700 mb-4"
>
  <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
  </svg>
  Quay lại
</button>

<h2 class="text-lg font-semibold text-gray-800 mb-1">Nhập mã OTP</h2>
<p class="text-sm text-gray-500 mb-5">
  Mã 6 chữ số đã được gửi đến
  <span class="font-medium text-gray-700">{{ phone }}</span>
</p>

<form [formGroup]="otpForm" (ngSubmit)="formSubmit.emit()" novalidate>
  <div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-1" for="otp-input">Mã OTP</label>
    <input
      id="otp-input"
      type="text"
      inputmode="numeric"
      formControlName="otp"
      placeholder="______"
      maxlength="6"
      autocomplete="one-time-code"
      class="w-full px-4 py-3 border rounded-xl text-sm text-center tracking-widest outline-none transition
             focus:ring-2 focus:ring-blue-500 focus:border-blue-500 placeholder-gray-300"
      [class.border-red-400]="otpForm.get('otp')?.invalid && otpForm.get('otp')?.touched"
      [class.border-gray-300]="!(otpForm.get('otp')?.invalid && otpForm.get('otp')?.touched)"
    />
    <p *ngIf="otpForm.get('otp')?.invalid && otpForm.get('otp')?.touched" class="mt-1 text-xs text-red-500">
      Vui lòng nhập đúng 6 chữ số
    </p>
  </div>

  <div class="flex items-center justify-between mb-4 text-sm">
    <span class="text-gray-500">
      Mã hết hạn sau:
      <span class="font-mono font-semibold"
        [class.text-red-500]="countdown <= 30"
        [class.text-gray-700]="countdown > 30"
      >{{ countdownDisplay }}</span>
    </span>
    <button
      type="button"
      (click)="resend.emit()"
      [disabled]="!canResend || loading"
      class="text-blue-600 font-medium disabled:text-gray-400 disabled:cursor-not-allowed hover:underline"
    >
      Gửi lại
    </button>
  </div>

  <p *ngIf="errorMsg" class="mb-3 text-sm text-red-500 text-center">{{ errorMsg }}</p>

  <button
    type="submit"
    [disabled]="otpForm.invalid || loading"
    class="w-full py-3 rounded-xl text-sm font-semibold text-white transition
           bg-gradient-to-r from-cyan-500 to-emerald-500 hover:from-cyan-600 hover:to-emerald-600
           disabled:opacity-50 disabled:cursor-not-allowed"
  >
    <span *ngIf="!loading">{{ submitLabel }}</span>
    <span *ngIf="loading" class="flex items-center justify-center gap-2">
      <svg class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
      </svg>
      Đang xác nhận...
    </span>
  </button>
</form>
