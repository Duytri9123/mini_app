<div class="sticky top-0 z-10 bg-white border-b border-gray-100 flex items-center gap-3 px-4 py-3">
  <button
    (click)="backClick.emit()"
    class="p-2 rounded-full hover:bg-gray-100 transition-colors"
    aria-label="Quay lại"
  >
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <div class="flex-1 min-w-0">
    <h1 class="text-base font-semibold text-gray-900 truncate">{{ title }}</h1>
    <p *ngIf="subtitle" class="text-xs text-gray-500 truncate">{{ subtitle }}</p>
  </div>
  <ng-content></ng-content>
</div>
