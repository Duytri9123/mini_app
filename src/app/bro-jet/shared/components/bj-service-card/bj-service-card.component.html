<div
  class="rounded-2xl border-2 p-4 cursor-pointer transition-all"
  [ngClass]="selected
    ? 'border-blue-500 bg-blue-50 shadow-md'
    : 'border-gray-200 bg-white hover:border-blue-300 hover:shadow-sm'"
  (click)="onSelect()"
>
  <!-- Header -->
  <div class="flex items-start justify-between gap-2">
    <h3 class="font-semibold text-gray-900 text-sm">{{ package.name }}</h3>
    <span
      *ngIf="selected"
      class="shrink-0 bg-cyan-500 text-white text-xs font-semibold px-2 py-0.5 rounded-full"
    >
      Đã chọn
    </span>
  </div>

  <!-- Description -->
  <p class="text-xs text-gray-500 mt-1 line-clamp-2">{{ package.description }}</p>

  <!-- Meta -->
  <div class="mt-3 flex flex-wrap gap-3 text-xs text-gray-600">
    <!-- Price -->
    <span class="flex items-center gap-1 font-semibold text-blue-600 text-sm">
      {{ formattedPrice }}
    </span>

    <!-- Duration -->
    <span class="flex items-center gap-1">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      {{ durationText }}
    </span>
  </div>
</div>
