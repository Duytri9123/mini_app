<div
  class="relative flex flex-row  bg-white rounded-[20px] overflow-hidden shadow-[0_0_12px_rgba(0,0,0,0.02),0_10px_25px_-10px_rgba(0,0,0,0.04),0_4px_10px_-2px_rgba(0,0,0,0.03)] border border-slate-100/50 cursor-pointer mb-3 transition-all duration-300 active:scale-[0.982] active:shadow-sm hover:shadow-[0_0_20px_rgba(0,0,0,0.03),0_20px_25px_-5px_rgba(0,0,0,0.08)] hover:-translate-y-[2px]"
  (click)="onCardClick()">

  <!-- ── Thumbnail ── -->
  <div class="relative w-[108px] min-w-[108px] overflow-hidden bg-slate-100">
    <img [src]="firstImage" [alt]="station.name"
      class="w-full h-full object-cover transition-all duration-700 hover:scale-110"
      [class.grayscale]="badgeStatus !== 'open'"
      (error)="$any($event.target).src = 'https://images.unsplash.com/photo-1520340356584-f9917d1eea6f?auto=format&fit=crop&q=80&w=400'" />

    <!-- Gradient overlay -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/30 via-transparent to-transparent pointer-events-none">
    </div>

    <!-- Status badge -->
    <span
      class="absolute top-2 left-2 text-[9px] font-extrabold uppercase tracking-[0.6px] px-2 py-[3.5px] rounded-[7px] transition-all duration-300 text-white"
      [class.bg-brand-green]="badgeStatus === 'open'"
      [class.shadow-[0_2px_8px_rgba(44,196,98,0.45)]]="badgeStatus === 'open'"
      [class.bg-rose-500]="badgeStatus !== 'open'"
      [class.shadow-[0_2px_8px_rgba(244,63,94,0.45)]]="badgeStatus !== 'open'">
      {{ badgeStatus === 'open' ? 'Mở' : 'Đóng' }}
    </span>
  </div>

  <!-- ── Info ── -->
  <div class="flex flex-col flex-1 min-w-0 justify-between px-2 pt-[11px] pb-[11px] pl-[11px] gap-2.5">

    <!-- Row 1: Title -->
    <h3 class="text-[16px] font-extrabold text-[#1a1d2e] truncate font-headline leading-tight">
      {{ station.name }}
    </h3>

    <!-- Row 2: Address -->
    <p class="text-[12px] text-slate-600 font-medium truncate">
      {{ station.address }}
    </p>
    
    <!-- Row 3: Distance + Rating -->
    <div class="flex items-center gap-2.5">
      <!-- Distance -->
      <div class="flex items-center gap-[5px] shrink-0">
        <svg class="w-[14px] h-[14px] flex-shrink-0 text-primary" xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24" fill="none">
          <path
            d="M2.07006 4.59988C2.87006 1.13988 8.08006 1.13988 8.87006 4.59988C9.34006 6.62988 8.05006 8.34988 6.93006 9.41988C6.11006 10.1999 4.82006 10.1899 4.00006 9.41988C2.89006 8.34988 1.60006 6.62988 2.07006 4.59988Z"
            stroke="currentColor" stroke-width="2" />
          <path
            d="M15.07 16.5999C15.87 13.1399 21.11 13.1399 21.91 16.5999C22.38 18.6299 21.09 20.3499 19.96 21.4199C19.14 22.1999 17.84 22.1899 17.02 21.4199C15.89 20.3499 14.6 18.6299 15.07 16.5999Z"
            stroke="currentColor" stroke-width="2" />
          <path
            d="M11.9997 5H14.6797C16.5297 5 17.3897 7.29 15.9997 8.51L8.0097 15.5C6.6197 16.71 7.4797 19 9.3197 19H11.9997"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M5.48573 5.5H5.49728" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
          <path d="M18.4857 17.5H18.4973" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
        <span class="text-[12px] font-bold text-primary">{{ distanceText }}</span>
      </div>

      <span class="w-[3px] h-[3px] rounded-full bg-slate-300 flex-shrink-0"></span>

      <!-- Rating (pushed to end) -->
      <div class="flex items-center gap-1 ml-auto shrink-0">
        <span class="text-amber-400 text-[12px]">★</span>
        <span class="text-[12px] font-bold text-[#1a1d2e]">{{ (station.rating || 5.0) | number:'1.1-1' }}</span>
        <span class="text-[12px] text-slate-500 font-medium">({{ station.reviewCount || 0 }})</span>
      </div>
    </div>

    <!-- Row 4: Time + Book button -->
    <div class="flex items-center justify-between gap-2">
      <!-- Time -->
      <div *ngIf="station.openTime && station.closeTime" class="flex items-center gap-[5px]">
        <svg class="w-[14px] h-[14px] flex-shrink-0 text-slate-500" xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24" fill="none">
          <path d="M22 12C22 17.52 17.52 22 12 22C6.48 22 2 17.52 2 12C2 6.48 6.48 2 12 2C17.52 2 22 6.48 22 12Z"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M15.7099 15.1798L12.6099 13.3298C12.0699 13.0098 11.6299 12.2398 11.6299 11.6098V7.50977"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span class="text-[12px] font-bold text-[#1a1d2e]">{{ station.openTime }} – {{ station.closeTime }}</span>
      </div>

      <!-- Book button -->
      <button *ngIf="showBookButton && badgeStatus === 'open'"
        class="relative overflow-hidden text-[11px] font-bold text-white bg-primary px-[13px] py-[6px] rounded-[10px] whitespace-nowrap tracking-[0.2px] transition-all duration-200 active:scale-95 hover:bg-primary-dark hover:shadow-[0_4px_12px_rgba(0,173,239,0.4)] group"
        (click)="onBookClick($event)">
        <span
          class="absolute inset-0 -translate-x-full group-hover:translate-x-full transition-transform duration-700 bg-gradient-to-r from-transparent via-white/20 to-transparent"></span>
        Đặt lịch ngay
      </button>

      <!-- Detail button (khi đóng cửa) -->
      <button *ngIf="showBookButton && badgeStatus !== 'open'"
        class="text-[11px] font-bold text-primary bg-primary-soft px-[13px] py-[6px] rounded-[10px] whitespace-nowrap transition-all duration-150 active:scale-95 hover:bg-primary-light/20"
        (click)="onCardClick()">
        Chi tiết
      </button>
    </div>

  </div>
</div>
