<div
  class="flex items-center gap-4 bg-white dark:bg-slate-900 p-3 rounded-xl transition-all cursor-pointer group border-2"
  [ngClass]="selected 
    ? 'border-primary shadow-md bg-primary/5 dark:bg-primary/10' 
    : 'border-transparent hover:bg-slate-50 dark:hover:bg-slate-800/50 hover:border-slate-100 dark:hover:border-slate-800'"
  (click)="onSelect()"
>
  <!-- Vehicle Icon / Image -->
  <div class="flex items-center justify-center rounded-xl shrink-0 size-14 transition-colors overflow-hidden border"
    [ngClass]="selected ? 'bg-primary text-white border-primary/20' : 'bg-primary/10 text-primary border-transparent'">
    <img *ngIf="vehicle.imageUrl" [src]="getFullImageUrl(vehicle.imageUrl)" (error)="onImageError($event)" class="w-full h-full object-cover">
    <span *ngIf="!vehicle.imageUrl" class="material-symbols-outlined text-3xl">{{ symbolIcon }}</span>
  </div>

  <!-- Vehicle Info -->
  <div class="flex flex-col flex-1 justify-center min-w-0">
    <div class="flex items-center gap-2">
      <p class="text-slate-900 dark:text-slate-100 text-base font-bold leading-normal truncate">
        {{ vehicle.name || vehicle.licensePlate }}
      </p>
      <span *ngIf="vehicle.isDefault" class="text-[10px] font-bold bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 px-1.5 py-0.5 rounded uppercase tracking-wider">Mặc định</span>
    </div>
    <p class="text-slate-500 dark:text-slate-400 text-sm font-medium truncate">
      <span *ngIf="vehicle.name" class="font-bold text-slate-700 dark:text-slate-300">{{ vehicle.licensePlate }} • </span>
      {{ typeLabel }}
    </p>
  </div>

  <!-- Actions / Chevron -->
  <div class="shrink-0 flex items-center gap-2">
    <div *ngIf="showActions" class="flex items-center gap-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
      <button (click)="onSetDefault($event)" *ngIf="!vehicle.isDefault" 
        class="p-2 rounded-lg text-slate-400 hover:text-green-500 hover:bg-green-50 dark:hover:bg-green-900/20 transition-colors">
        <span class="material-symbols-outlined text-xl">verified</span>
      </button>
      <button (click)="onEdit($event)"
        class="p-2 rounded-lg text-slate-400 hover:text-primary hover:bg-primary/5 dark:hover:bg-primary/20 transition-colors">
        <span class="material-symbols-outlined text-xl">edit</span>
      </button>
      <button (click)="onDelete($event)"
        class="p-2 rounded-lg text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
        <span class="material-symbols-outlined text-xl">delete</span>
      </button>
    </div>
    <span class="material-symbols-outlined text-slate-300 group-hover:text-primary transition-colors">chevron_right</span>
  </div>
</div>
