<div class="relative flex bg-white rounded-3xl shadow-md shadow-slate-200/60 overflow-hidden border border-slate-100 h-32 w-full transition-transform"
     [class.active:scale-[0.98]]="showAction && voucher.status === 'active'"
     [class.opacity-70]="voucher.status !== 'active'">
                    
    <!-- Left Section: Icon/Value -->
    <div class="w-20 flex flex-col items-center justify-center relative flex-shrink-0"
         [class]="voucher.status === 'active' ? 'bg-primary/5' : 'bg-slate-50'">
        <div class="size-11 bg-white rounded-2xl flex items-center justify-center shadow-sm"
             [class]="voucher.status === 'active' ? 'text-primary' : 'text-slate-400'">
            <span class="w-6 h-6" [innerHTML]="icon('VOUCHER')"></span>
        </div>
        <div class="mt-2 px-1.5 py-0.5 rounded-lg shadow-sm"
             [class]="voucher.status === 'active' ? 'bg-primary shadow-primary/20' : 'bg-slate-400 shadow-slate-400/20'">
            <p class="text-[7.5px] text-white font-black uppercase tracking-widest">{{ voucher.code }}</p>
        </div>

        <!-- Ticket Cutouts -->
        <div class="absolute -right-[6px] -top-[6px] w-3 h-3 bg-[#f8fffe] rounded-full border border-slate-50/50"></div>
        <div class="absolute -right-[6px] -bottom-[6px] w-3 h-3 bg-[#f8fffe] rounded-full border border-slate-50/50"></div>
    </div>

    <!-- Divider -->
    <div class="w-px h-full border-l border-dashed border-slate-200 relative">
        <!-- Middle Cutouts Decor -->
        <div class="absolute -top-3 -left-[6px] size-3 bg-[#f8fffe] rounded-full shadow-[inset_0_-2px_4px_rgba(0,0,0,0.02)]"></div>
        <div class="absolute -bottom-3 -left-[6px] size-3 bg-[#f8fffe] rounded-full shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)]"></div>
    </div>

    <!-- Right Section: Details -->
    <div class="flex-1 px-4 py-3 flex items-center justify-between gap-2">
        <div class="flex-1 min-w-0 pr-1">
            <h4 class="text-slate-900 font-black text-[16px] leading-tight mb-1 truncate">
                {{ formatDiscount(voucher) }}
            </h4>
            
            <div class="space-y-0.5">
                <p class="text-[10px] text-slate-500 font-bold whitespace-nowrap overflow-hidden text-ellipsis">
                    Đơn tối thiểu: <span [class]="voucher.status === 'active' ? 'text-primary' : 'text-slate-400'">{{ formatCurrency(voucher.minOrder) }}</span>
                </p>
                <p *ngIf="voucher.maxDiscount" class="text-[10px] text-slate-500 font-bold whitespace-nowrap overflow-hidden text-ellipsis">
                    Giảm tối đa: <span [class]="voucher.status === 'active' ? 'text-red-500' : 'text-slate-400'">{{ formatCurrency(voucher.maxDiscount) }}</span>
                </p>
                
                <div class="flex items-center gap-1.5 mt-2 px-2 py-1 bg-slate-50 rounded-xl w-fit border border-slate-100">
                    <span class="w-3.5 h-3.5 text-slate-400" [innerHTML]="icon('TIMER')"></span>
                    <p class="text-[9px] text-slate-400 font-black uppercase tracking-tighter">
                        HSD: {{ voucher.validUntil | date:'dd/MM/yyyy' }}
                    </p>
                </div>
            </div>
        </div>

        <!-- Action Button or Status Badge -->
        <ng-container *ngIf="showAction && voucher.status === 'active'; else statusBadge">
            <button (click)="actionClick.emit(voucher)" 
                    class="shrink-0 bg-primary text-white h-10 px-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-primary/25 active:scale-90 transition-all">
                {{ actionText }}
            </button>
        </ng-container>
        <ng-template #statusBadge>
            <div class="shrink-0" *ngIf="!showAction || voucher.status !== 'active'">
                <span *ngIf="voucher.status === 'active'" class="px-2 py-1 bg-emerald-50 text-emerald-600 text-[10px] font-bold rounded-full uppercase border border-emerald-100">Còn dùng</span>
                <span *ngIf="voucher.status === 'used'" class="px-2 py-1 bg-slate-50 text-[#9ca3af] text-[10px] font-bold rounded-full uppercase border border-slate-100">Đã dùng</span>
                <span *ngIf="voucher.status === 'expired'" class="px-2 py-1 bg-red-50 text-red-400 text-[10px] font-bold rounded-full uppercase border border-red-100">Hết hạn</span>
            </div>
        </ng-template>
    </div>
</div>
