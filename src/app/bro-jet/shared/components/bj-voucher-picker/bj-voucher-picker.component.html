<!-- Backdrop -->
<div class="fixed inset-0 z-40 bg-black/50 backdrop-blur-sm" (click)="closed.emit()"></div>

<!-- Sheet -->
<div class="fixed bottom-0 left-0 right-0 z-50 bg-white dark:bg-slate-900 rounded-t-2xl shadow-2xl max-h-[80vh] flex flex-col font-display">
  <!-- Handle -->
  <div class="flex justify-center pt-3 pb-1">
    <div class="w-10 h-1 rounded-full bg-slate-200 dark:bg-slate-700"></div>
  </div>

  <!-- Header -->
  <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100 dark:border-slate-800">
    <h3 class="text-base font-bold text-slate-900 dark:text-slate-100">Chọn mã giảm giá</h3>
    <button (click)="closed.emit()" class="size-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
      <span class="material-symbols-outlined text-slate-500">close</span>
    </button>
  </div>

  <!-- Content -->
  <div class="flex-1 overflow-y-auto p-4 space-y-3">
    <!-- Loading -->
    <div *ngIf="loading" class="flex justify-center py-12">
      <ion-spinner name="crescent" color="primary"></ion-spinner>
    </div>

    <!-- Error -->
    <div *ngIf="error && !loading" class="text-center py-12 text-slate-400">
      <span class="material-symbols-outlined text-4xl mb-2 opacity-30">error</span>
      <p class="text-sm">Không thể tải danh sách voucher</p>
    </div>

    <!-- Empty -->
    <div *ngIf="!loading && !error && vouchers.length === 0" class="text-center py-12 text-slate-400">
      <span class="material-symbols-outlined text-4xl mb-2 opacity-30">confirmation_number</span>
      <p class="text-sm">Bạn chưa có voucher nào</p>
    </div>

    <!-- Voucher list -->
    <div *ngFor="let v of vouchers"
      (click)="select(v)"
      class="relative flex items-center gap-4 rounded-xl border-2 p-4 transition-all"
      [ngClass]="canUse(v)
        ? (selectedCode === v.code
            ? 'border-primary bg-primary/5 cursor-pointer'
            : 'border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 cursor-pointer hover:border-primary/40')
        : 'border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 opacity-50 cursor-not-allowed'">

      <!-- Icon -->
      <div class="size-12 rounded-xl flex items-center justify-center shrink-0"
        [ngClass]="canUse(v) ? 'bg-primary/10' : 'bg-slate-100 dark:bg-slate-800'">
        <span class="material-symbols-outlined text-2xl" [ngClass]="canUse(v) ? 'text-primary' : 'text-slate-400'">confirmation_number</span>
      </div>

      <!-- Info -->
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-0.5">
          <span class="text-sm font-black tracking-wide" [ngClass]="canUse(v) ? 'text-primary' : 'text-slate-400'">{{ v.code }}</span>
          <span *ngIf="selectedCode === v.code" class="text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-primary text-white">Đang dùng</span>
        </div>
        <p class="text-sm font-bold text-slate-900 dark:text-slate-100 truncate">{{ discountLabel(v) }}</p>
        <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">
          <span *ngIf="canUse(v)">HSD: {{ v.validUntil | date:'dd/MM/yyyy' }}</span>
          <span *ngIf="!canUse(v)" class="text-amber-500 font-medium">{{ statusLabel(v) }}</span>
        </p>
      </div>

      <!-- Check icon -->
      <span *ngIf="selectedCode === v.code" class="material-symbols-outlined text-primary text-xl shrink-0">check_circle</span>
    </div>
  </div>
</div>
