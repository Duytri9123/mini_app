<div class="bg-white rounded-2xl p-4 shadow-sm">
  <!-- Header -->
  <div class="flex items-center justify-between mb-3">
    <div class="flex items-center gap-2">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        class="text-blue-500">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10"/>
        <path d="M12 6v6l4 2"/>
        <path d="M18 2l2 2-2 2"/>
        <path d="M22 2l-2 2"/>
      </svg>
      <span class="text-sm font-semibold text-gray-800">{{ status }}</span>
    </div>
    <span class="text-xs text-gray-500 font-mono">{{ clampedProgress }}%</span>
  </div>

  <!-- Progress bar -->
  <div class="w-full bg-gray-100 rounded-full h-3 overflow-hidden">
    <div
      class="h-full rounded-full progress-bar"
      [ngClass]="progressColor"
      [style.width.%]="clampedProgress"
    ></div>
  </div>

  <!-- ETA -->
  <div class="mt-2 flex items-center justify-between text-xs text-gray-500">
    <span>Tiến độ rửa xe</span>
    <span *ngIf="etaSeconds > 0" class="flex items-center gap-1">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      Còn {{ etaFormatted }}
    </span>
    <span *ngIf="clampedProgress >= 100" class="text-green-600 font-semibold">Hoàn thành!</span>
  </div>
</div>
