<aside class="h-full w-72 bg-white p-4 shadow-xl">
  <div class="mb-6 flex items-center justify-between">
    <h2 class="text-lg font-extrabold text-slate-950">GapMove</h2>
    <button type="button" class="text-sm font-semibold text-slate-500" (click)="closeSidebar.emit()">Dong</button>
  </div>
  <nav class="space-y-1">
    <a
      *ngFor="let link of links"
      [routerLink]="link.route"
      class="block rounded-xl px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50"
      (click)="closeSidebar.emit()"
    >
      {{ link.label }}
    </a>
  </nav>
</aside>
