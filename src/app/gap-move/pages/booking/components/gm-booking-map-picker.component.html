<div class="fixed inset-0 z-[80] bg-slate-950/55 p-3 backdrop-blur-sm lg:p-5">
  <div class="mx-auto flex h-full max-w-7xl flex-col overflow-hidden rounded-[24px] bg-white shadow-2xl">
    <div class="flex items-center justify-between border-b border-slate-100 px-4 py-2">
      <div>
        <p class="text-xs font-black uppercase text-[#ff5a00]">Chọn trên bản đồ</p>
        <h3 class="text-sm font-extrabold text-slate-950">{{ title }}</h3>
      </div>
      <div class="flex items-center gap-2">
        <button type="button" class="rounded-full bg-slate-100 px-4 py-2 text-xs font-bold text-slate-700" (click)="closePicker.emit()">Đóng</button>
        <button type="button" class="rounded-full bg-[#008c95] px-4 py-2 text-xs font-bold text-white" (click)="confirmSelection.emit()">Xác nhận</button>
      </div>
    </div>

    <div class="border-b border-slate-100 px-4 py-2">
      <div class="grid items-center gap-2 lg:grid-cols-[auto_minmax(0,1fr)_auto]">
        <div class="flex flex-wrap items-center gap-2">
          <button
            type="button"
            class="rounded-xl px-3 py-2 text-xs font-bold"
            [ngClass]="activeAddressField === 'pickup' ? 'bg-[#008c95] text-white' : 'bg-slate-100 text-slate-600'"
            (click)="switchField.emit({ field: 'pickup' })"
          >
            Điểm lấy
          </button>
          <button
            *ngIf="activeAddressField === 'stop'"
            type="button"
            class="rounded-xl bg-[#008c95] px-3 py-2 text-xs font-bold text-white"
          >
            Điểm dừng {{ (activeStopIndex ?? 0) + 1 }}
          </button>
          <button
            type="button"
            class="rounded-xl px-3 py-2 text-xs font-bold"
            [ngClass]="activeAddressField === 'dropoff' ? 'bg-[#008c95] text-white' : 'bg-slate-100 text-slate-600'"
            (click)="switchField.emit({ field: 'dropoff' })"
          >
            Điểm đến
          </button>
        </div>

        <div class="relative min-w-0">
          <label class="flex h-10 w-full items-center gap-3 rounded-2xl border border-slate-200 bg-white px-4">
            <ion-icon name="search-outline" class="text-lg text-slate-400"></ion-icon>
            <input
              name="mapSearchQuery"
              [ngModel]="searchQuery"
              (ngModelChange)="updateSearchQuery($event)"
              placeholder="Tìm kiếm địa chỉ..."
              class="min-w-0 flex-1 border-0 bg-transparent text-sm font-semibold outline-none"
            />
          </label>
          <div *ngIf="searchResults.length" class="absolute inset-x-0 top-full z-30 mt-2 overflow-hidden rounded-2xl border border-slate-100 bg-white shadow-xl">
            <button
              *ngFor="let result of searchResults"
              type="button"
              class="block w-full border-b border-slate-100 px-4 py-3 text-left text-sm font-semibold text-slate-600 last:border-b-0 hover:bg-slate-50"
              (click)="useSearchResult.emit(result)"
            >
              {{ result.address }}
            </button>
          </div>
        </div>

        <button type="button" class="rounded-xl border border-[#008c95]/20 px-3 py-2 text-xs font-bold text-[#008c95]" (click)="locate.emit()">
          {{ isLocating ? 'Đang lấy vị trí...' : 'Vị trí của tôi' }}
        </button>
      </div>

      <div class="mt-2 flex items-center gap-2 rounded-xl bg-slate-50 px-3 py-2">
        <span class="shrink-0 text-[10px] font-black uppercase text-slate-400">Vị trí đang chọn</span>
        <p class="min-w-0 truncate text-xs font-bold text-slate-900">{{ pendingAddress }}</p>
      </div>
    </div>

    <div class="min-h-0 flex-1">
      <app-gm-map
        [pickup]="pickup"
        [dropoff]="dropoff"
        [stops]="stops"
        [stopIndexes]="stopIndexes"
        [selectable]="true"
        [draggable]="true"
        (selectCoordinate)="selectCoordinate.emit($event)"
        (markerDragEnd)="markerDragEnd.emit($event)"
      ></app-gm-map>
    </div>
  </div>
</div>
