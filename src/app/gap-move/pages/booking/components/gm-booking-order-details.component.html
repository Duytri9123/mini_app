<section class="mb-6 rounded-2xl border border-slate-100 bg-white p-4">
  <h2 class="mb-4 text-sm font-black uppercase text-slate-400">Thông tin đơn</h2>

  <div class="grid gap-3 sm:grid-cols-2">
    <label class="text-sm font-semibold text-slate-700">
      Người gửi
      <input
        name="senderName"
        [ngModel]="senderName"
        (ngModelChange)="senderNameChange.emit($event)"
        class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
        placeholder="Tên người gửi"
      />
    </label>
    <label class="text-sm font-semibold text-slate-700">
      SĐT người gửi
      <input
        name="senderPhone"
        [ngModel]="senderPhone"
        (ngModelChange)="senderPhoneChange.emit($event)"
        class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
        placeholder="Số điện thoại"
      />
    </label>
    <label class="text-sm font-semibold text-slate-700">
      {{ isCargoOrder ? 'Người nhận' : 'Hành khách' }}
      <input
        name="receiverName"
        [ngModel]="receiverName"
        (ngModelChange)="receiverNameChange.emit($event)"
        class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
        [placeholder]="isCargoOrder ? 'Tên người nhận' : 'Tên hành khách'"
      />
    </label>
    <label class="text-sm font-semibold text-slate-700">
      {{ isCargoOrder ? 'SĐT người nhận' : 'SĐT hành khách' }}
      <input
        name="receiverPhone"
        [ngModel]="receiverPhone"
        (ngModelChange)="receiverPhoneChange.emit($event)"
        class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
        placeholder="Số điện thoại"
      />
    </label>
  </div>

  <label class="mt-4 block text-sm font-semibold text-slate-700" for="packageInfo">
    {{ isCargoOrder ? 'Mô tả hàng hóa / nhu cầu' : 'Ghi chú chuyến đi' }}
  </label>
  <input
    id="packageInfo"
    name="packageInfo"
    [ngModel]="packageInfo"
    (ngModelChange)="packageInfoChange.emit($event)"
    class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
  />

  <div *ngIf="isCargoOrder" class="mt-4 grid grid-cols-2 gap-3">
    <label class="text-sm font-semibold text-slate-700">
      Thu hộ COD
      <input
        type="number"
        min="0"
        name="codAmount"
        [ngModel]="codAmount"
        (ngModelChange)="codAmountChange.emit($event)"
        class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
      />
    </label>
    <label class="text-sm font-semibold text-slate-700">
      Giá trị hàng
      <input
        type="number"
        min="0"
        name="declaredValue"
        [ngModel]="declaredValue"
        (ngModelChange)="declaredValueChange.emit($event)"
        class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
      />
    </label>
    <label class="text-sm font-semibold text-slate-700">
      Số kiện
      <input
        type="number"
        min="1"
        name="itemCount"
        [ngModel]="itemCount"
        (ngModelChange)="itemCountChange.emit($event)"
        class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
      />
    </label>
    <label class="text-sm font-semibold text-slate-700">
      Khối lượng (kg)
      <input
        type="number"
        min="0"
        name="weightKg"
        [ngModel]="weightKg"
        (ngModelChange)="weightKgChange.emit($event)"
        class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
      />
    </label>
    <label class="text-sm font-semibold text-slate-700">
      Dài (cm)
      <input
        type="number"
        min="0"
        name="lengthCm"
        [ngModel]="lengthCm"
        (ngModelChange)="lengthCmChange.emit($event)"
        class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
      />
    </label>
    <label class="text-sm font-semibold text-slate-700">
      Rộng (cm)
      <input
        type="number"
        min="0"
        name="widthCm"
        [ngModel]="widthCm"
        (ngModelChange)="widthCmChange.emit($event)"
        class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
      />
    </label>
    <label class="text-sm font-semibold text-slate-700">
      Cao (cm)
      <input
        type="number"
        min="0"
        name="heightCm"
        [ngModel]="heightCm"
        (ngModelChange)="heightCmChange.emit($event)"
        class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
      />
    </label>
    <label class="text-sm font-semibold text-slate-700">
      Mã vận đơn
      <input
        name="trackingCode"
        [ngModel]="trackingCode"
        (ngModelChange)="trackingCodeChange.emit($event)"
        class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
        placeholder="Tuỳ chọn"
      />
    </label>
  </div>

  <div class="mt-4 grid grid-cols-2 gap-2">
    <button
      type="button"
      class="rounded-xl border px-3 py-3 text-sm font-bold"
      [ngClass]="scheduleMode === 'now' ? 'border-[#008c95] bg-[#008c95]/5' : 'border-slate-200'"
      (click)="setScheduleMode('now')"
    >
      Đặt ngay
    </button>
    <button
      type="button"
      class="rounded-xl border px-3 py-3 text-sm font-bold"
      [ngClass]="scheduleMode === 'scheduled' ? 'border-[#008c95] bg-[#008c95]/5' : 'border-slate-200'"
      (click)="setScheduleMode('scheduled')"
    >
      Đặt lịch
    </button>
  </div>
  <input
    *ngIf="scheduleMode === 'scheduled'"
    type="datetime-local"
    name="scheduledAt"
    [ngModel]="scheduledAt"
    (ngModelChange)="scheduledAtChange.emit($event)"
    class="mt-3 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
  />

  <label class="mt-4 block text-sm font-semibold text-slate-700" for="note">Ghi chú cho tài xế / đội bê hàng</label>
  <textarea
    id="note"
    name="note"
    [ngModel]="note"
    (ngModelChange)="noteChange.emit($event)"
    rows="3"
    class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
  ></textarea>
</section>
