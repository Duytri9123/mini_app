<section *ngIf="isCargoOrder" class="mb-6 rounded-2xl border border-slate-100 bg-white p-4 shadow-sm">
  <div class="mb-4 flex items-center justify-between gap-3">
    <h2 class="flex items-center gap-2 text-base font-extrabold text-slate-950">
      <ion-icon name="cube-outline" class="text-xl text-slate-400"></ion-icon>
      <span>Thông tin hàng hoá<span class="text-[#ff5a00]">*</span></span>
      <button type="button" aria-label="Xem chi tiết kích cỡ" (click)="showSizeDetailsModal = true" class="flex items-center">
        <ion-icon name="information-circle-outline" class="text-lg text-[#008c95] hover:text-[#ff5a00] transition"></ion-icon>
      </button>
    </h2>
    <button type="button" class="text-sm font-extrabold text-[#ff5a00]">Xem hình ảnh</button>
  </div>

  <div>
    <div class="mb-2 flex items-end justify-between gap-3 cursor-pointer active:opacity-75 transition" (click)="showSizeDetailsModal = true">
      <label class="text-sm font-extrabold text-slate-700 cursor-pointer">Kích cỡ <span class="text-[#ff5a00]">*</span></label>
      <span class="min-w-0 truncate text-sm font-bold text-[#008c95] flex items-center gap-1 hover:text-[#ff5a00] transition">
        {{ selectedCargoSizeDescription }}
        <ion-icon name="chevron-forward-outline" class="text-xs"></ion-icon>
      </span>
    </div>
    <swiper-container class="gm-cargo-size-swiper" slides-per-view="auto" space-between="8" free-mode="true">
      <swiper-slide *ngFor="let size of cargoSizes">
        <button
          type="button"
          class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full border text-sm font-bold transition active:scale-95"
          [ngClass]="selectedCargoSize === size.id ? 'border-[#ff5a00] bg-orange-50 text-[#ff5a00] shadow-sm shadow-orange-500/10' : 'border-slate-200 bg-white text-slate-900'"
          (click)="selectCargoSize(size)"
        >
          {{ size.id }}
        </button>
      </swiper-slide>
    </swiper-container>
  </div>

  <label class="mt-4 block text-sm font-extrabold text-slate-700">
    Khối lượng (kg) <span class="text-[#ff5a00]">*</span>
    <input
      type="number"
      min="0"
      name="weightKg"
      [ngModel]="weightKg"
      (ngModelChange)="weightKgChange.emit($event)"
      class="mt-2 h-14 w-full rounded-xl border border-slate-200 px-4 text-base font-semibold outline-none focus:border-[#ff5a00]"
    />
  </label>

  <div class="mt-4">
    <label class="mb-2 block text-sm font-extrabold text-slate-700">Loại hàng hoá <span class="text-[#ff5a00]">*</span></label>
    <swiper-container class="gm-cargo-type-swiper" slides-per-view="auto" space-between="8" free-mode="true">
      <swiper-slide *ngFor="let cargoType of cargoTypes">
        <button
          type="button"
          class="shrink-0 rounded-full border px-4 py-2 text-sm font-semibold transition active:scale-95"
          [ngClass]="packageInfo === cargoType ? 'border-slate-900 bg-slate-900 text-white' : 'border-slate-200 bg-white text-slate-700'"
          (click)="selectCargoType(cargoType)"
        >
          {{ cargoType }}
        </button>
      </swiper-slide>
    </swiper-container>
  </div>

  <!-- Size Details Modal -->
  <div *ngIf="showSizeDetailsModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/50 p-4 backdrop-blur-sm">
    <div class="w-full max-w-sm rounded-[24px] bg-white p-5 shadow-2xl animate-fade-in relative z-[110]">
      <div class="mb-4 flex items-center justify-between">
        <h3 class="text-base font-extrabold text-slate-900">Chi tiết kích cỡ hàng hóa</h3>
        <button type="button" class="flex h-8 w-8 items-center justify-center rounded-full bg-slate-100 text-slate-600 active:scale-95 transition" (click)="showSizeDetailsModal = false">
          <ion-icon name="close-outline" class="text-xl"></ion-icon>
        </button>
      </div>

      <div class="space-y-2.5 max-h-[360px] overflow-y-auto pr-1">
        <div *ngFor="let size of cargoSizes" class="flex items-center justify-between rounded-xl border p-3 cursor-pointer transition"
          [ngClass]="selectedCargoSize === size.id ? 'border-[#ff5a00] bg-orange-50/20' : 'border-slate-100 hover:bg-slate-50'"
          (click)="selectCargoSize(size); showSizeDetailsModal = false">
          <span class="flex h-9 w-9 items-center justify-center rounded-full text-xs font-black shrink-0"
            [ngClass]="selectedCargoSize === size.id ? 'bg-[#ff5a00] text-white' : 'bg-slate-100 text-slate-700'">
            {{ size.id }}
          </span>
          <div class="ml-3 flex-1 min-w-0">
            <span class="block text-sm font-bold text-slate-900">Kích cỡ {{ size.id }}</span>
            <span class="block text-xs font-semibold text-slate-500 truncate">{{ size.description }}</span>
          </div>
          <span class="text-xs font-extrabold text-[#ff5a00] shrink-0 ml-2" *ngIf="selectedCargoSize === size.id">Đang chọn</span>
        </div>
      </div>

      <button type="button" class="mt-5 h-12 w-full rounded-2xl bg-[#ff5a00] font-extrabold text-white shadow-lg shadow-orange-500/20 active:scale-[0.99] transition" (click)="showSizeDetailsModal = false">
        Xác nhận
      </button>
    </div>
  </div>
</section>
