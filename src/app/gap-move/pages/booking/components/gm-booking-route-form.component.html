<section class="mb-5 rounded-[22px] border border-slate-100 bg-white p-4 shadow-sm">
  <div class="mb-4 flex items-center justify-between">
    <h2 class="text-sm font-black uppercase text-slate-400">Tuyến đường</h2>
    <div class="flex items-center gap-3">
      <button
        type="button"
        class="text-sm font-bold"
        [ngClass]="isRouteReorderMode ? 'text-[#008c95]' : 'text-slate-500'"
        [disabled]="!stopAddresses.length"
        (click)="toggleRouteReorder.emit()"
      >
        {{ isRouteReorderMode ? 'Xong sắp xếp' : 'Sắp xếp điểm' }}
      </button>
      <button type="button" class="text-sm font-bold text-[#ff5a00]" (click)="addStop.emit()">+ Thêm điểm</button>
    </div>
  </div>

  <div class="mb-4 overflow-hidden rounded-2xl border border-slate-100 bg-slate-50">
    <button
      type="button"
      class="flex w-full items-center justify-between gap-3 bg-white px-3 py-3 text-left"
      (click)="isSavedAddressOpen = !isSavedAddressOpen"
    >
      <span class="flex min-w-0 items-center gap-3">
        <ion-icon name="bookmark" class="text-xl text-[#ff5a00]"></ion-icon>
        <span>
          <span class="block text-sm font-extrabold text-slate-900">Địa chỉ đã lưu</span>
          <span class="block text-xs font-semibold text-slate-400">Dùng cho {{ activeTargetLabel }}</span>
        </span>
      </span>
      <ion-icon [name]="isSavedAddressOpen ? 'chevron-up-outline' : 'chevron-down-outline'" class="text-xl text-slate-400"></ion-icon>
    </button>

    <div *ngIf="isSavedAddressOpen" class="max-h-64 overflow-y-auto border-t border-slate-100">
      <div *ngIf="savedAddressesLoading" class="px-3 py-4 text-sm font-semibold text-slate-400">Đang tải địa chỉ...</div>
      <div *ngIf="!savedAddressesLoading && !savedAddresses.length" class="px-3 py-4 text-sm font-semibold text-slate-400">Chưa có địa chỉ đã lưu.</div>
      <button
        *ngFor="let item of savedAddresses"
        type="button"
        class="flex w-full items-start gap-3 border-b border-slate-100 bg-white px-3 py-3 text-left last:border-b-0 hover:bg-slate-50"
        (click)="selectSavedAddress(item)"
      >
        <ion-icon name="bookmark" class="mt-0.5 text-lg text-[#ff5a00]"></ion-icon>
        <span class="min-w-0 flex-1">
          <span class="flex items-center gap-2">
            <span class="truncate text-sm font-extrabold text-slate-900">{{ item.label || 'Địa chỉ' }}</span>
            <span *ngIf="item.is_default" class="rounded-full bg-[#008c95]/10 px-2 py-0.5 text-[10px] font-black uppercase text-[#008c95]">Mặc định</span>
          </span>
          <span class="mt-0.5 line-clamp-2 text-xs font-semibold leading-5 text-slate-500">{{ item.address }}</span>
        </span>
      </button>
    </div>
  </div>

  <div class="space-y-3">
    <div>
      <label class="text-xs font-bold uppercase text-slate-400" for="pickupAddress">
        {{ type === 'porter' ? 'Địa điểm bê hàng' : 'Điểm lấy / đón' }}
      </label>
      <div class="mt-2 flex gap-2">
        <input
          id="pickupAddress"
          name="pickupAddress"
          [ngModel]="pickupAddress"
          (ngModelChange)="pickupAddressChange.emit($event); pickupInput.emit()"
          (focus)="setActiveTarget({ field: 'pickup' })"
          class="min-w-0 flex-1 rounded-2xl border border-slate-200 px-4 py-3 text-sm"
        />
        <button
          type="button"
          class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl border border-[#008c95]/20 text-[#008c95]"
          aria-label="Chọn điểm lấy trên bản đồ"
          title="Chọn điểm lấy trên bản đồ"
          (click)="openMapFor({ field: 'pickup' })"
        >
          <ion-icon name="map-outline" class="text-lg"></ion-icon>
        </button>
      </div>
      <div *ngIf="pickupSuggestions.length" class="mt-2 overflow-hidden rounded-2xl border border-slate-100 bg-slate-50">
        <button
          *ngFor="let result of pickupSuggestions"
          type="button"
          class="block w-full border-b border-slate-100 px-3 py-2 text-left text-xs text-slate-600 last:border-b-0"
          (click)="useSuggestion.emit({ field: 'pickup', result })"
        >
          {{ result.address }}
        </button>
      </div>
    </div>

    <p *ngIf="isRouteReorderMode && stopAddresses.length" class="rounded-2xl bg-orange-50 px-3 py-2 text-xs font-bold leading-5 text-[#ff5a00]">
      Kéo điểm dừng hoặc điểm đến để đổi thứ tự. Điểm cuối cùng sẽ là điểm đến.
    </p>

    <div
      *ngFor="let stop of stopAddresses; let i = index"
      class="rounded-2xl"
      [class.bg-slate-50]="isRouteReorderMode"
      [class.p-2]="isRouteReorderMode"
      [draggable]="isRouteReorderMode"
      (dragstart)="startRouteDrag(i)"
      (dragover)="allowRouteDrop($event)"
      (drop)="dropRoutePoint(i, $event)"
      (dragend)="endRouteDrag()"
    >
      <label class="text-xs font-bold uppercase text-slate-400" [for]="'stop-' + i">Điểm dừng {{ i + 1 }}</label>
      <div class="mt-2 flex gap-2">
        <span *ngIf="isRouteReorderMode" class="flex h-11 w-9 shrink-0 items-center justify-center rounded-2xl border border-slate-200 bg-white text-slate-400">
          <ion-icon name="reorder-three-outline" class="text-xl"></ion-icon>
        </span>
        <input
          [id]="'stop-' + i"
          [name]="'stopAddress' + i"
          [ngModel]="stopAddresses[i]"
          (ngModelChange)="stopAddressChange.emit({ index: i, address: $event }); stopInput.emit(i)"
          (focus)="setActiveTarget({ field: 'stop', stopIndex: i })"
          class="min-w-0 flex-1 rounded-2xl border border-slate-200 px-4 py-3 text-sm"
        />
        <button
          type="button"
          class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl border border-[#008c95]/20 text-[#008c95]"
          aria-label="Chọn điểm dừng trên bản đồ"
          title="Chọn điểm dừng trên bản đồ"
          (click)="openMapFor({ field: 'stop', stopIndex: i })"
        >
          <ion-icon name="map-outline" class="text-lg"></ion-icon>
        </button>
        <div *ngIf="isRouteReorderMode" class="flex shrink-0 overflow-hidden rounded-2xl border border-slate-200 bg-white">
          <button type="button" class="flex h-11 w-9 items-center justify-center text-slate-500" aria-label="Đưa điểm lên" (click)="movePoint(i, i - 1)">
            <ion-icon name="chevron-up-outline"></ion-icon>
          </button>
          <button type="button" class="flex h-11 w-9 items-center justify-center border-l border-slate-100 text-slate-500" aria-label="Đưa điểm xuống" (click)="movePoint(i, i + 1)">
            <ion-icon name="chevron-down-outline"></ion-icon>
          </button>
        </div>
        <button type="button" class="rounded-2xl border border-red-100 px-3 text-sm font-bold text-red-600" (click)="removeStop.emit(i)">Xóa</button>
      </div>
      <div *ngIf="stopSuggestions[i]?.length" class="mt-2 overflow-hidden rounded-2xl border border-slate-100 bg-slate-50">
        <button
          *ngFor="let result of stopSuggestions[i]"
          type="button"
          class="block w-full border-b border-slate-100 px-3 py-2 text-left text-xs text-slate-600 last:border-b-0"
          (click)="useSuggestion.emit({ field: 'stop', stopIndex: i, result })"
        >
          {{ result.address }}
        </button>
      </div>
    </div>

    <div
      class="rounded-2xl"
      [class.bg-orange-50]="isRouteReorderMode && stopAddresses.length"
      [class.p-2]="isRouteReorderMode && stopAddresses.length"
      [draggable]="isRouteReorderMode && stopAddresses.length > 0"
      (dragstart)="startRouteDrag(stopAddresses.length)"
      (dragover)="allowRouteDrop($event)"
      (drop)="dropRoutePoint(stopAddresses.length, $event)"
      (dragend)="endRouteDrag()"
    >
      <label class="text-xs font-bold uppercase text-slate-400" for="dropoffAddress">
        {{ type === 'porter' ? 'Điểm hoàn tất' : 'Điểm giao / đến' }}
      </label>
      <div class="mt-2 flex gap-2">
        <span *ngIf="isRouteReorderMode && stopAddresses.length" class="flex h-11 w-9 shrink-0 items-center justify-center rounded-2xl border border-orange-100 bg-white text-[#ff5a00]">
          <ion-icon name="reorder-three-outline" class="text-xl"></ion-icon>
        </span>
        <input
          id="dropoffAddress"
          name="dropoffAddress"
          [ngModel]="dropoffAddress"
          (ngModelChange)="dropoffAddressChange.emit($event); dropoffInput.emit()"
          (focus)="setActiveTarget({ field: 'dropoff' })"
          class="min-w-0 flex-1 rounded-2xl border border-slate-200 px-4 py-3 text-sm"
        />
        <button
          type="button"
          class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl border border-[#008c95]/20 text-[#008c95]"
          aria-label="Chọn điểm giao trên bản đồ"
          title="Chọn điểm giao trên bản đồ"
          (click)="openMapFor({ field: 'dropoff' })"
        >
          <ion-icon name="map-outline" class="text-lg"></ion-icon>
        </button>
        <div *ngIf="isRouteReorderMode && stopAddresses.length" class="flex shrink-0 overflow-hidden rounded-2xl border border-orange-100 bg-white">
          <button type="button" class="flex h-11 w-9 items-center justify-center text-slate-500" aria-label="Đưa điểm đến lên" (click)="movePoint(stopAddresses.length, stopAddresses.length - 1)">
            <ion-icon name="chevron-up-outline"></ion-icon>
          </button>
          <button type="button" class="flex h-11 w-9 items-center justify-center border-l border-slate-100 text-slate-500" aria-label="Đưa điểm đến xuống" (click)="movePoint(stopAddresses.length, stopAddresses.length + 1)">
            <ion-icon name="chevron-down-outline"></ion-icon>
          </button>
        </div>
      </div>
      <div *ngIf="dropoffSuggestions.length" class="mt-2 overflow-hidden rounded-2xl border border-slate-100 bg-slate-50">
        <button
          *ngFor="let result of dropoffSuggestions"
          type="button"
          class="block w-full border-b border-slate-100 px-3 py-2 text-left text-xs text-slate-600 last:border-b-0"
          (click)="useSuggestion.emit({ field: 'dropoff', result })"
        >
          {{ result.address }}
        </button>
      </div>
    </div>
  </div>
</section>
