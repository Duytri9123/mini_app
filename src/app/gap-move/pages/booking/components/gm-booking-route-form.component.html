<section class="gm-booking-route-card mb-5 rounded-[22px] border border-slate-100 bg-white p-4 shadow-sm">
  <!-- Route Details Header -->
  <div class="mb-4 flex items-center justify-between">
    <h2 class="text-base font-bold text-slate-950">Chi tiết lộ trình</h2>
    <button type="button" class="rounded-xl bg-white px-3 py-2 text-xs font-bold text-slate-900 border border-slate-200 shadow-sm active:scale-95 transition" (click)="addStop.emit()">
      + Thêm điểm
    </button>
  </div>

  <div #routeList class="gm-mobile-route-list">
    <!-- Swap button (only visible when there are no stops, identical to home screen) -->
    <button *ngIf="stopAddresses.length === 0" type="button" class="gm-mobile-route-switch-button" aria-label="Đổi điểm lấy và điểm đến"
      title="Đổi điểm lấy và điểm đến" (click)="swapPickupDropoff(); $event.stopPropagation()">
      <ion-icon name="swap-vertical-outline"></ion-icon>
    </button>

    <!-- Pickup Point -->
    <div class="gm-mobile-route-row">
      <div class="gm-mobile-route-field flex min-h-[44px] min-w-0 w-full items-stretch overflow-hidden rounded-xl border border-slate-200 bg-white p-0 shadow-[0_6px_18px_rgba(15,23,42,0.08),0_1px_3px_rgba(15,23,42,0.04)]"
        [class.gm-mobile-route-field-has-content]="pickupAddress">
        <div class="gm-mobile-route-click-area flex min-h-[44px] min-w-0 flex-1 items-center bg-transparent py-1.5 pl-2.5 pr-2.5 text-left select-none cursor-pointer"
          (click)="openMapFor({ field: 'pickup' }, $event)">
          <span class="gm-mobile-route-icon-container mr-3 flex h-6 w-6 flex-[0_0_24px] items-center justify-center">
            <span class="gm-mobile-route-marker-pickup-inside block h-3 w-3 rounded-full border-[2.5px] border-inverse-primary bg-white shadow-[0_2px_5px_rgba(255,90,0,0.35)]"></span>
          </span>
          <span class="gm-mobile-route-copy flex min-w-0 flex-1 flex-col justify-center">
            <span class="gm-mobile-route-text block min-w-0 overflow-hidden leading-tight" [ngClass]="pickupAddress ? 'text-slate-700 font-semibold' : 'text-slate-400'">
              {{ pickupAddress || 'Từ' }}
            </span>
          </span>
        </div>
      </div>
    </div>

    <!-- Stop Points -->
    <div
      *ngFor="let stop of stopAddresses; let i = index"
      class="gm-mobile-route-row gm-mobile-route-row-draggable transition-opacity duration-150"
      [class.opacity-40]="routeDragIndex === i"
      [class.gm-mobile-route-row-dragging]="routeDragIndex === i"
      [style.transform]="routeDragTransform(i)"
      [attr.data-route-destination-index]="i"
      (pointerdown)="beginRoutePointerDrag(i, $event)"
      (pointermove)="moveRoutePointerDrag($event)"
      (pointerup)="endRoutePointerDrag($event)"
      (pointercancel)="cancelRoutePointerDrag($event)"
    >
      <div class="gm-mobile-route-field flex min-h-[44px] min-w-0 w-full items-stretch overflow-hidden rounded-xl border border-slate-200 bg-white p-0 shadow-[0_6px_18px_rgba(15,23,42,0.08),0_1px_3px_rgba(15,23,42,0.04)]"
        [class.gm-mobile-route-field-has-content]="stop">
        <div class="gm-mobile-route-click-area flex min-h-[44px] min-w-0 flex-1 items-center bg-transparent py-1.5 pl-2.5 pr-2.5 text-left select-none cursor-pointer"
          (click)="openMapFor({ field: 'stop', stopIndex: i }, $event)">
          <span class="gm-mobile-route-icon-container mr-3 flex h-6 w-6 flex-[0_0_24px] items-center justify-center">
            <span class="gm-mobile-route-marker-stop-inside block h-2 w-2 rounded-full border-2 border-slate-500 bg-white shadow-[0_2px_4px_rgba(15,23,42,0.2)]"></span>
          </span>
          <span class="gm-mobile-route-copy flex min-w-0 flex-1 flex-col justify-center">
            <span class="gm-mobile-route-text block min-w-0 overflow-hidden leading-tight" [ngClass]="stop ? 'text-slate-700 font-semibold' : 'text-slate-400'">
              {{ stop || 'Điểm dừng ' + (i + 1) }}
            </span>
          </span>
        </div>
        <button type="button" class="gm-mobile-route-remove-inside inline-flex min-h-[44px] w-[34px] shrink-0 items-center justify-center border-l border-slate-100 bg-transparent text-xl text-slate-300"
          (click)="removeStop.emit(i); $event.stopPropagation()">
          <ion-icon name="close-outline"></ion-icon>
        </button>
        <span class="gm-mobile-route-drag-handle cursor-grab">
          <ion-icon name="reorder-three-outline"></ion-icon>
        </span>
      </div>
    </div>

    <!-- Dropoff Point -->
    <div
      class="gm-mobile-route-row transition-opacity duration-150"
      [class.opacity-40]="routeDragIndex === stopAddresses.length"
      [class.gm-mobile-route-row-draggable]="canDragDestinationPoints()"
      [class.gm-mobile-route-row-dragging]="routeDragIndex === stopAddresses.length"
      [style.transform]="routeDragTransform(stopAddresses.length)"
      [attr.data-route-destination-index]="stopAddresses.length"
      (pointerdown)="beginRoutePointerDrag(stopAddresses.length, $event)"
      (pointermove)="moveRoutePointerDrag($event)"
      (pointerup)="endRoutePointerDrag($event)"
      (pointercancel)="cancelRoutePointerDrag($event)"
    >
      <div class="gm-mobile-route-field flex min-h-[44px] min-w-0 w-full items-stretch overflow-hidden rounded-xl border border-slate-200 bg-white p-0 shadow-[0_6px_18px_rgba(15,23,42,0.08),0_1px_3px_rgba(15,23,42,0.04)]"
        [class.gm-mobile-route-field-has-content]="dropoffAddress">
        <div class="gm-mobile-route-click-area flex min-h-[44px] min-w-0 flex-1 items-center bg-transparent py-1.5 pl-2.5 pr-2.5 text-left select-none cursor-pointer"
          (click)="openMapFor({ field: 'dropoff' }, $event)">
          <span class="gm-mobile-route-icon-container mr-3 flex h-6 w-6 flex-[0_0_24px] items-center justify-center">
            <span class="gm-mobile-route-marker-dropoff-inside inline-flex items-center justify-center text-inverse-primary">
              <ion-icon name="location"></ion-icon>
            </span>
          </span>
          <span class="gm-mobile-route-copy flex min-w-0 flex-1 flex-col justify-center">
            <span class="gm-mobile-route-text block min-w-0 overflow-hidden leading-tight" [ngClass]="dropoffAddress ? 'text-slate-700 font-semibold' : 'text-slate-400'">
              {{ dropoffAddress || 'Đến' }}
            </span>
          </span>
        </div>
        <button *ngIf="dropoffAddress" type="button" class="gm-mobile-route-remove-inside inline-flex min-h-[44px] w-[34px] shrink-0 items-center justify-center border-l border-slate-100 bg-transparent text-xl text-slate-300" aria-label="Xóa điểm đến"
          (click)="dropoffAddressChange.emit(''); dropoffInput.emit(); $event.stopPropagation()">
          <ion-icon name="close-outline"></ion-icon>
        </button>
        <span *ngIf="stopAddresses.length > 0" class="gm-mobile-route-drag-handle cursor-grab">
          <ion-icon name="reorder-three-outline"></ion-icon>
        </span>
      </div>
    </div>
  </div>
</section>
