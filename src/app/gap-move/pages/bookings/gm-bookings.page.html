<section class="px-4 py-5">
  <div class="mb-4 flex items-center justify-between">
    <h1 class="text-2xl font-extrabold text-slate-950">Chuyen di cua ban</h1>
    <button type="button" class="rounded-xl bg-[#008c95] px-3 py-2 text-sm font-bold text-white" (click)="createBooking()">Tạo đơn</button>
  </div>

  <ng-container *ngIf="bookings$ | async as bookings">
    <div *ngIf="bookings.length; else empty" class="space-y-3">
      <app-gm-booking-card
        *ngFor="let booking of bookings"
        [booking]="booking"
        (openBooking)="openBooking($event)"
      ></app-gm-booking-card>
    </div>
    <ng-template #empty>
      <app-gm-empty-state
        icon="receipt-outline"
        title="Chua co don nao"
        description="Tao don dat xe hoac giao hang dau tien cua ban."
        ctaLabel="Tao don"
        (ctaClick)="createBooking()"
      ></app-gm-empty-state>
    </ng-template>
  </ng-container>
</section>
