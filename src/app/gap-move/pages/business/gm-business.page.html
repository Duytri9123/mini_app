<section class="min-h-full bg-slate-50 px-4 py-5 lg:px-8 lg:py-8">
  <div class="mx-auto max-w-4xl rounded-3xl bg-white p-6 shadow-sm">
    <p class="text-xs font-black uppercase tracking-wide text-[#ff5a00]">Business</p>
    <h1 class="mt-2 text-3xl font-black text-slate-950">GapMove cho doanh nghiệp</h1>
    <p class="mt-3 text-sm leading-7 text-slate-500">Dành cho shop online, văn phòng, kho nhỏ và đội vận hành cần đặt giao hàng hoặc xe tải thường xuyên.</p>
    <div class="mt-6 grid gap-3 md:grid-cols-2">
      <div *ngFor="let feature of features" class="rounded-2xl border border-slate-100 p-4 text-sm font-bold text-slate-700">
        {{ feature }}
      </div>
    </div>
  </div>
</section>
