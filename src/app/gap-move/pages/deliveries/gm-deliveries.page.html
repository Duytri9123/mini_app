<section class="px-4 py-5">
  <div class="mb-4 flex items-center justify-between">
    <h1 class="text-2xl font-extrabold text-slate-950">Don giao hang</h1>
    <a routerLink="/gap-move/booking/new" [queryParams]="{ type: 'delivery' }" class="rounded-xl bg-[#008c95] px-3 py-2 text-sm font-bold text-white">Tạo đơn</a>
  </div>

  <div class="space-y-3">
    <article *ngFor="let delivery of deliveries$ | async" class="rounded-2xl bg-white p-4 shadow-sm">
      <div class="flex items-start justify-between gap-3">
        <div>
          <p class="text-xs font-bold uppercase text-[#008c95]">{{ delivery.trackingCode }}</p>
          <h2 class="mt-1 font-bold text-slate-950">{{ delivery.pickup.address }}</h2>
          <p class="mt-1 text-sm text-slate-500">{{ delivery.dropoff.address }}</p>
        </div>
        <span class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-semibold text-slate-600">{{ delivery.status }}</span>
      </div>
      <div class="mt-3 flex justify-between border-t border-slate-100 pt-3 text-sm">
        <span class="text-slate-500">Thu ho {{ formatAmount(delivery.codAmount || 0) }}</span>
        <span class="font-bold text-slate-950">{{ formatAmount(delivery.finalAmount) }}</span>
      </div>
    </article>
  </div>
</section>
