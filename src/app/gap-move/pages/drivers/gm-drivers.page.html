<section class="min-h-full bg-slate-50 px-4 py-5">
  <div class="mb-5 flex items-end justify-between gap-4">
    <div>
      <p class="text-xs font-black uppercase tracking-wide text-[#ff5a00]">Mockdata realtime</p>
      <h1 class="mt-1 text-2xl font-extrabold text-slate-950">Tài xế đang hoạt động</h1>
    </div>
    <span class="rounded-full bg-[#008c95]/10 px-3 py-2 text-xs font-black text-[#008c95]">Di chuyển liên tục</span>
  </div>

  <ng-container *ngIf="drivers$ | async as drivers">
    <div class="mb-4 h-[320px] overflow-hidden rounded-3xl border border-slate-100 bg-white shadow-sm">
      <app-gm-map [drivers]="drivers"></app-gm-map>
    </div>

    <div class="space-y-3">
      <article *ngFor="let driver of drivers" class="rounded-2xl bg-white p-4 shadow-sm">
        <div class="flex items-center justify-between gap-3">
          <div>
            <h2 class="font-bold text-slate-950">{{ driver.fullName }}</h2>
            <p class="text-sm text-slate-500">{{ driver.vehicle.name }} - {{ driver.vehicle.licensePlate }}</p>
            <p class="mt-1 text-xs text-slate-400">{{ driver.totalTrips }} chuyến - {{ driver.rating }} sao</p>
          </div>
          <button type="button" class="rounded-xl bg-[#008c95] px-3 py-2 text-sm font-bold text-white" (click)="book(driver)">Đặt</button>
        </div>
      </article>
    </div>
  </ng-container>
</section>
