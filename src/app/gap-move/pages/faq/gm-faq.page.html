<section class="px-4 py-5">
  <h1 class="mb-4 text-2xl font-extrabold text-slate-950">Ho tro & FAQ</h1>
  <div class="space-y-3">
    <article *ngFor="let faq of faqs" class="rounded-2xl bg-white p-4 shadow-sm">
      <h2 class="font-bold text-slate-950">{{ faq.question }}</h2>
      <p class="mt-2 text-sm leading-6 text-slate-500">{{ faq.answer }}</p>
    </article>
  </div>
</section>
