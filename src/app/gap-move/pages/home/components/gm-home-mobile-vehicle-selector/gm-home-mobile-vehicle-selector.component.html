<section class="bg-white px-4 pb-3 pt-2 lg:hidden">
  <div class="mb-4 flex items-center justify-between">
    <h2 class="text-lg font-extrabold text-slate-950">Phương tiện có sẵn</h2>
    <span class="text-xs font-bold text-slate-400">{{ modeLabel }}</span>
  </div>

  <div class="grid grid-cols-2 gap-2.5">
    <ng-container *ngFor="let vehicle of vehicles; let i = index">
      <button type="button"
        class="gm-mobile-vehicle-row flex min-w-0 items-center gap-1.5 rounded-xl border bg-white px-2 py-2 text-left shadow-sm transition active:scale-[0.99]"
        [ngClass]="selectedVehicleId === vehicle.id ? 'border-[#ff5a00] bg-orange-50/30 shadow-orange-500/10' : 'border-slate-100'"
        (click)="selectVehicle(vehicle)">
        <span class="gm-mobile-vehicle-art" [class.gm-mobile-vehicle-art-image]="vehicle.imageUrl"
          [ngClass]="vehicle.artClass">
          <img *ngIf="vehicle.imageUrl; else vehicleIonIcon" [src]="vehicle.imageUrl" [alt]="vehicle.title"
            class="h-full w-full object-contain" />
          <ng-template #vehicleIonIcon>
            <ion-icon [name]="vehicle.icon"></ion-icon>
          </ng-template>
        </span>
        <span class="min-w-0 flex-1">
          <span class="block text-[13px] font-extrabold leading-[17px] text-slate-950">{{ vehicle.title }}</span>
        </span>
      </button>

      <article *ngIf="shouldRenderVehicleDetailsAfter(i) && selectedVehicle as selected"
        class="col-span-2 rounded-2xl border border-orange-100 bg-orange-50/50 p-3">
        <div class="flex items-start gap-3">
          <span class="gm-mobile-vehicle-art gm-mobile-vehicle-art-image" [ngClass]="selected.artClass">
            <img *ngIf="selected.imageUrl; else selectedVehicleIonIcon" [src]="selected.imageUrl" [alt]="selected.title"
              class="h-full w-full object-contain" />
            <ng-template #selectedVehicleIonIcon>
              <ion-icon [name]="selected.icon"></ion-icon>
            </ng-template>
          </span>
          <div class="min-w-0 flex-1">
            <h3 class="text-sm font-black text-slate-950">{{ selected.title }}</h3>
            <p class="mt-1 text-xs font-semibold leading-5 text-slate-500">{{ selected.description || selected.subtitle }}</p>
            <div class="mt-2 flex flex-wrap gap-2 text-[11px] font-bold text-slate-600">
              <span *ngIf="selected.maxWeightKg" class="rounded-full bg-white px-2.5 py-1">{{ selected.maxWeightKg }}kg</span>
              <span *ngIf="selected.dimensions" class="rounded-full bg-white px-2.5 py-1">{{ selected.dimensions }}</span>
            </div>
          </div>
        </div>
      </article>
    </ng-container>
  </div>

  <button type="button"
    class="mt-4 w-full rounded-[16px] py-3.5 text-base font-extrabold text-white shadow-lg transition active:scale-[0.99]"
    [disabled]="!isRouteReadyForServices"
    [ngClass]="isRouteReadyForServices ? 'bg-[#ff5a00] shadow-orange-500/20' : 'bg-slate-300 shadow-none'"
    (click)="bookNow.emit()">
    Đặt ngay
  </button>

  <section *ngIf="activeMobileMode === 'delivery' && isRouteReadyForServices" class="mt-4 space-y-2.5">
    <button *ngFor="let packageOption of deliveryPackages" type="button"
      class="flex w-full items-center justify-between gap-3 rounded-2xl border bg-white px-4 py-3 text-left"
      [ngClass]="selectedDeliveryPackageId === packageOption.id ? 'border-[#ff5a00] bg-orange-50/60 text-slate-950' : 'border-slate-100 text-slate-700'"
      (click)="selectDeliveryPackage(packageOption)">
      <span class="min-w-0">
        <span class="block text-sm font-black">{{ packageOption.title }}</span>
        <span class="mt-0.5 block text-xs font-semibold leading-5 text-slate-500">{{ packageOption.subtitle }}</span>
      </span>
      <span class="shrink-0 text-sm font-black text-slate-900">{{ formatDeliveryPackagePrice(packageOption) }}</span>
    </button>
  </section>

  <div *ngIf="!isRouteReadyForServices" class="mt-4 rounded-2xl border border-dashed border-slate-200 bg-slate-50 px-4 py-4 text-center">
    <p class="text-sm font-extrabold text-slate-900">Chọn điểm dừng và điểm đến để xem gói dịch vụ</p>
    <p class="mt-1 text-xs font-semibold leading-5 text-slate-500">Mỗi địa chỉ sẽ được xác nhận lại trên bản đồ trước khi lưu vào tuyến.</p>
  </div>
</section>
