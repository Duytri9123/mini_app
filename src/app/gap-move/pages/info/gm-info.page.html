<section class="min-h-full bg-white px-4 py-8 lg:px-8 lg:py-14">
  <div class="mx-auto grid max-w-7xl gap-10 lg:grid-cols-[minmax(0,1fr)_460px] lg:items-center">
    <div>
      <p class="text-xs font-black uppercase tracking-wide text-[#ff5a00]">{{ content.eyebrow }}</p>
      <h1 class="mt-3 max-w-4xl text-xl font-black leading-tight text-slate-950 lg:text-5xl">{{ content.title }}</h1>
      <p class="mt-5 max-w-2xl text-base font-medium leading-8 text-slate-500">{{ content.summary }}</p>

      <div class="mt-8 grid gap-3">
        <div *ngFor="let point of content.points" class="flex items-start gap-3 rounded-2xl border border-slate-100 bg-slate-50 p-4">
          <span class="mt-1 flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-[#008c95]/10 text-[#008c95]">
            <ion-icon name="checkmark-outline" class="text-sm"></ion-icon>
          </span>
          <p class="text-sm font-bold leading-6 text-slate-700">{{ point }}</p>
        </div>
      </div>

      <a [routerLink]="content.ctaRoute" class="mt-8 inline-flex rounded-2xl bg-[#008c95] px-5 py-3 text-sm font-extrabold text-white shadow-lg shadow-teal-900/15">
        {{ content.ctaLabel }}
      </a>
    </div>

    <div class="relative overflow-hidden rounded-[32px] bg-slate-950 shadow-2xl shadow-slate-200">
      <img [src]="content.imageUrl" [alt]="content.title" class="h-[420px] w-full object-cover opacity-85" />
      <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-slate-950 via-slate-950/65 to-transparent p-6 text-white">
        <p class="text-sm font-bold text-[#ff8a3d]">GapMove</p>
        <h2 class="mt-2 text-2xl font-black">Giao hàng là trọng tâm, các dịch vụ còn lại hỗ trợ vận hành trọn vẹn hơn.</h2>
      </div>
    </div>
  </div>
</section>
