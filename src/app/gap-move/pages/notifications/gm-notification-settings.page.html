<section class="px-4 py-5">
  <h1 class="mb-4 text-2xl font-extrabold text-slate-950">Cai dat thong bao</h1>
  <div class="space-y-3">
    <label class="flex items-center justify-between rounded-2xl bg-white p-4 shadow-sm">
      <span class="font-semibold text-slate-900">Cap nhat chuyen di</span>
      <input type="checkbox" name="booking" [(ngModel)]="booking" />
    </label>
    <label class="flex items-center justify-between rounded-2xl bg-white p-4 shadow-sm">
      <span class="font-semibold text-slate-900">Cap nhat giao hang</span>
      <input type="checkbox" name="delivery" [(ngModel)]="delivery" />
    </label>
    <label class="flex items-center justify-between rounded-2xl bg-white p-4 shadow-sm">
      <span class="font-semibold text-slate-900">Khuyen mai</span>
      <input type="checkbox" name="promotion" [(ngModel)]="promotion" />
    </label>
  </div>
</section>
