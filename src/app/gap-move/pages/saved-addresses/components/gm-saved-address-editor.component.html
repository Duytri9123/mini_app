<div class="fixed inset-0 z-[80] bg-white lg:bg-slate-950/55 lg:p-5 lg:backdrop-blur-sm">
  <div class="relative mx-auto flex h-full max-w-5xl flex-col overflow-hidden bg-white lg:rounded-[24px] lg:shadow-2xl">
    <div class="absolute inset-x-4 top-4 z-[90] flex items-center gap-3">
      <button
        type="button"
        class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full border border-slate-100 bg-white text-slate-700 shadow-lg"
        aria-label="Quay lại"
        (click)="closeEditor.emit()"
      >
        <ion-icon name="chevron-back-outline" class="text-2xl"></ion-icon>
      </button>

      <div class="relative min-w-0 flex-1">
        <label class="flex h-12 items-center gap-3 rounded-[16px] border border-slate-100 bg-white px-4 shadow-lg">
          <ion-icon name="bookmark" class="text-xl text-[#ff5a00]"></ion-icon>
          <input
            name="savedAddressSearchQuery"
            [ngModel]="searchQuery"
            (ngModelChange)="updateSearchQuery($event)"
            class="min-w-0 flex-1 border-0 bg-transparent text-base font-bold text-slate-800 outline-none placeholder:text-slate-400"
            placeholder="Nhập một địa chỉ"
          />
        </label>

        <div *ngIf="searchResults.length" class="absolute inset-x-0 top-full z-[100] mt-2 max-h-[240px] overflow-y-auto rounded-2xl border border-slate-100 bg-white shadow-xl">
          <button
            *ngFor="let result of searchResults"
            type="button"
            class="block w-full border-b border-slate-100 px-4 py-3 text-left text-sm font-semibold text-slate-600 last:border-b-0 hover:bg-slate-50"
            (click)="useSearchResult.emit(result)"
          >
            {{ result.address }}
          </button>
        </div>
      </div>
    </div>

    <div class="absolute inset-0 z-10">
      <app-gm-map
        class="block h-full w-full"
        [dropoff]="coordinate"
        [selectable]="true"
        [draggable]="true"
        (selectCoordinate)="selectCoordinate.emit($event)"
        (markerDragEnd)="selectCoordinate.emit($event.coordinate)"
      ></app-gm-map>
    </div>

    <button
      type="button"
      class="absolute right-4 top-[76px] z-[95] flex h-11 w-11 items-center justify-center rounded-full border border-slate-100 bg-white text-slate-800 shadow-xl"
      aria-label="Vị trí hiện tại"
      (click)="locate.emit()"
    >
      <ion-icon [name]="isLocating ? 'sync-outline' : 'locate-outline'" class="text-xl"></ion-icon>
    </button>

    <section class="absolute inset-x-4 bottom-4 z-40 rounded-[20px] border border-slate-100/80 bg-white p-4 shadow-[0_12px_36px_rgba(15,23,42,0.18)]">
      <div class="mb-3">
        <span class="text-[10px] font-black uppercase tracking-wider text-[#ff5a00]">{{ title }}</span>
        <p class="mt-1 line-clamp-2 text-sm font-extrabold leading-5 text-slate-900">
          {{ pendingAddress || 'Tìm kiếm hoặc chạm bản đồ để chọn vị trí' }}
        </p>
      </div>

      <div class="grid gap-3 sm:grid-cols-[minmax(0,1fr)_auto] sm:items-end">
        <label class="text-sm font-bold text-slate-700">
          Tên gợi nhớ
          <input
            name="savedAddressLabel"
            [ngModel]="label"
            (ngModelChange)="labelChange.emit($event)"
            class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"
            placeholder="Nhà, Công ty..."
          />
        </label>

        <label class="flex min-h-12 items-center gap-2 rounded-2xl border border-slate-200 px-4 py-3 text-sm font-bold text-slate-700">
          <input type="checkbox" [ngModel]="isDefault" (ngModelChange)="isDefaultChange.emit($event)" name="savedAddressDefault" />
          Mặc định
        </label>
      </div>

      <div class="mt-3 grid gap-2 sm:grid-cols-2">
        <input
          name="savedAddressContactName"
          [ngModel]="contactName"
          (ngModelChange)="contactNameChange.emit($event)"
          class="h-11 rounded-xl border border-slate-200 px-3 text-sm font-semibold outline-none placeholder:text-slate-400"
          placeholder="Tên liên lạc"
        />
        <input
          name="savedAddressPhone"
          [ngModel]="phone"
          (ngModelChange)="phoneChange.emit($event)"
          inputmode="tel"
          class="h-11 rounded-xl border border-slate-200 px-3 text-sm font-semibold outline-none placeholder:text-slate-400"
          placeholder="Số điện thoại"
        />
      </div>

      <label class="mt-3 grid gap-2 text-sm font-bold text-slate-700">
        Ghi chú cho tài xế
        <textarea
          name="savedAddressNote"
          [ngModel]="note"
          (ngModelChange)="noteChange.emit($event)"
          maxlength="250"
          class="h-20 resize-none rounded-xl border border-slate-200 px-3 py-2 text-sm font-semibold outline-none placeholder:text-slate-400"
          placeholder="Thêm ghi chú, ví dụ: cổng đỏ, lầu 2."
        ></textarea>
      </label>

      <div class="mt-4 flex gap-2">
        <button type="button" class="flex-1 rounded-xl bg-slate-100 py-3 text-sm font-extrabold text-slate-600" (click)="closeEditor.emit()">Đóng</button>
        <button
          type="button"
          class="flex-[2] rounded-xl bg-[#ff5a00] py-3 text-sm font-extrabold text-white shadow-lg shadow-orange-500/20 disabled:opacity-60"
          [disabled]="isSaving || !coordinate"
          (click)="saveAddress.emit()"
        >
          {{ isSaving ? 'Đang lưu...' : 'Lưu địa chỉ' }}
        </button>
      </div>
    </section>
  </div>
</div>
