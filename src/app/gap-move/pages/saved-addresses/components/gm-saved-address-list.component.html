<div class="mx-auto max-w-2xl">
  <button
    type="button"
    class="flex w-full items-center justify-between gap-4 border-b border-slate-100 bg-white px-4 py-4 text-left"
    (click)="addAddress.emit()"
  >
    <span class="flex min-w-0 items-center gap-4">
      <ion-icon name="bookmark" class="text-2xl text-[#ff5a00]"></ion-icon>
      <span class="min-w-0">
        <span class="block text-lg font-black text-slate-950">Thêm địa chỉ đã lưu</span>
        <span class="mt-0.5 block text-sm font-semibold text-slate-400">Truy cập vị trí nhanh hơn</span>
      </span>
    </span>
    <ion-icon name="chevron-forward-outline" class="text-2xl text-slate-500"></ion-icon>
  </button>

  <div *ngIf="isLoading" class="px-4 py-5 text-sm font-semibold text-slate-400">Đang tải địa chỉ...</div>

  <div *ngIf="!isLoading && !addresses.length" class="px-4 py-10 text-center text-sm font-semibold text-slate-400">
    Chưa có địa chỉ đã lưu.
  </div>

  <article *ngFor="let item of addresses" class="border-b border-slate-100 bg-white px-4 py-4">
    <div class="flex items-start justify-between gap-3">
      <button type="button" class="flex min-w-0 flex-1 items-start gap-3 text-left" (click)="editAddress.emit(item)">
        <ion-icon name="bookmark" class="mt-1 text-xl text-[#ff5a00]"></ion-icon>
        <span class="min-w-0">
          <span class="flex items-center gap-2">
            <span class="truncate text-base font-black text-slate-950">{{ item.label || 'Địa chỉ' }}</span>
            <span *ngIf="item.is_default" class="rounded-full bg-[#008c95]/10 px-2 py-0.5 text-[10px] font-black uppercase text-[#008c95]">
              Mặc định
            </span>
          </span>
          <span class="mt-1 line-clamp-2 text-sm font-semibold leading-5 text-slate-500">{{ item.address }}</span>
          <span *ngIf="getAddressDetailsText(item) as detailsText" class="mt-1 block truncate text-xs font-bold text-slate-400">
            {{ detailsText }}
          </span>
        </span>
      </button>

      <div class="flex shrink-0 items-center gap-1">
        <button
          type="button"
          class="flex h-9 w-9 items-center justify-center rounded-full bg-slate-100 text-slate-600 disabled:opacity-40"
          [disabled]="item.is_default"
          aria-label="Đặt mặc định"
          (click)="setDefaultAddress.emit(item)"
        >
          <ion-icon name="checkmark-circle-outline" class="text-lg"></ion-icon>
        </button>
        <button
          type="button"
          class="flex h-9 w-9 items-center justify-center rounded-full bg-red-50 text-red-600"
          aria-label="Xóa địa chỉ"
          (click)="deleteAddress.emit(item)"
        >
          <ion-icon name="trash-outline" class="text-lg"></ion-icon>
        </button>
      </div>
    </div>
  </article>
</div>
