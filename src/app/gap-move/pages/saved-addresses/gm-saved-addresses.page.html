<section class="min-h-full bg-white">
  <header class="sticky top-0 z-30 border-b border-slate-100 bg-white px-4 py-4">
    <div class="mx-auto grid max-w-2xl grid-cols-[44px_minmax(0,1fr)_44px] items-center">
      <button type="button" class="flex h-10 w-10 items-center justify-center text-slate-600" aria-label="Quay lại" (click)="goBack()">
        <ion-icon name="chevron-back-outline" class="text-3xl"></ion-icon>
      </button>
      <h1 class="text-center text-xl font-black text-slate-950">Địa chỉ đã lưu</h1>
      <span></span>
    </div>
  </header>

  <app-gm-saved-address-list
    [addresses]="addresses"
    [isLoading]="isLoading"
    (addAddress)="openCreate()"
    (editAddress)="openEdit($event)"
    (setDefaultAddress)="setDefault($event)"
    (deleteAddress)="deleteAddress($event)"
  ></app-gm-saved-address-list>

  <app-gm-saved-address-editor
    *ngIf="isEditorOpen"
    [title]="editorTitle"
    [(label)]="addressLabel"
    [(isDefault)]="addressIsDefault"
    [(searchQuery)]="searchQuery"
    [searchResults]="searchResults"
    [coordinate]="editorCoordinate"
    [pendingAddress]="pendingAddress"
    [isLocating]="isLocating"
    [isSaving]="isSaving"
    (searchInput)="onSearchInput()"
    (useSearchResult)="useSearchResult($event)"
    (selectCoordinate)="useMapCoordinate($event)"
    (locate)="locateEditor()"
    (closeEditor)="closeEditor()"
    (saveAddress)="saveEditor()"
  ></app-gm-saved-address-editor>
</section>
