<section class="flex min-h-full flex-col px-4 py-5">
  <div class="flex-1 space-y-3">
    <div
      *ngFor="let message of messages$ | async"
      class="max-w-[82%] rounded-2xl px-4 py-3 text-sm leading-6"
      [class.ml-auto]="message.sender === 'customer'"
      [ngClass]="message.sender === 'customer' ? 'bg-[#008c95]' : 'bg-white'"
      [class.text-white]="message.sender === 'customer'"
      [class.text-slate-700]="message.sender === 'support'"
    >
      {{ message.body }}
    </div>
  </div>

  <form class="mt-4 flex gap-2" (ngSubmit)="send()">
    <input name="message" [(ngModel)]="message" class="min-w-0 flex-1 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm" />
    <button type="submit" class="rounded-2xl bg-[#008c95] px-4 py-3 text-sm font-bold text-white">Gửi</button>
  </form>
</section>
