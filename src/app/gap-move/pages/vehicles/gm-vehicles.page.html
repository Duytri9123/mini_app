<section class="px-4 py-5">
  <div class="mb-4 flex items-center justify-between">
    <h1 class="text-2xl font-extrabold text-slate-950">Phuong tien</h1>
    <a routerLink="/gap-move/vehicles/add" class="rounded-xl bg-[#008c95] px-3 py-2 text-sm font-bold text-white">Thêm</a>
  </div>

  <div class="space-y-3">
    <article *ngFor="let vehicle of vehicles$ | async" class="rounded-2xl bg-white p-4 shadow-sm">
      <p class="text-xs font-bold uppercase text-[#008c95]">{{ vehicle.vehicleType }}</p>
      <h2 class="mt-1 font-bold text-slate-950">{{ vehicle.name }}</h2>
      <p class="text-sm text-slate-500">{{ vehicle.licensePlate }} - {{ vehicle.brand }} {{ vehicle.model }}</p>
    </article>
  </div>
</section>
