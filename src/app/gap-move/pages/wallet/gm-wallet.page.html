<section class="px-4 py-5">
  <ng-container *ngIf="wallet$ | async as wallet">
    <div class="rounded-3xl bg-slate-950 p-5 text-white shadow-sm">
      <p class="text-sm text-white/60">So du vi</p>
      <h1 class="mt-2 text-3xl font-extrabold">{{ formatAmount(wallet.balance) }}</h1>
      <div class="mt-5 grid grid-cols-2 gap-3 text-sm">
        <div class="rounded-2xl bg-white/10 p-3">
          <p class="text-white/60">Diem thuong</p>
          <p class="mt-1 font-bold">{{ wallet.rewardPoints }}</p>
        </div>
        <div class="rounded-2xl bg-white/10 p-3">
          <p class="text-white/60">Dang giu</p>
          <p class="mt-1 font-bold">{{ formatAmount(wallet.lockedAmount) }}</p>
        </div>
      </div>
    </div>
  </ng-container>

  <h2 class="mb-3 mt-6 text-lg font-extrabold text-slate-950">Giao dich gan day</h2>
  <div class="space-y-3">
    <article *ngFor="let txn of transactions$ | async" class="flex items-center justify-between rounded-2xl bg-white p-4 shadow-sm">
      <div>
        <p class="font-bold text-slate-950">{{ txn.description }}</p>
        <p class="text-xs text-slate-500">{{ txn.status }}</p>
      </div>
      <span class="font-bold" [class.text-emerald-600]="txn.amount > 0" [class.text-slate-950]="txn.amount <= 0">
        {{ formatAmount(txn.amount) }}
      </span>
    </article>
  </div>
</section>
