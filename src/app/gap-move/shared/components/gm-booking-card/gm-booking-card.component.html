<button
  type="button"
  class="w-full rounded-2xl border border-slate-100 bg-white p-4 text-left shadow-sm active:scale-[0.99]"
  (click)="openBooking.emit(booking)"
>
  <div class="flex items-start justify-between gap-3">
    <p class="text-xs font-bold uppercase tracking-wide text-[#008c95]">
      {{ typeLabel(booking.type) }} - {{ booking.id }}
    </p>
    <span
      class="shrink-0 rounded-full px-2.5 py-1 text-xs font-semibold"
      [ngClass]="statusClass(booking.status)"
    >
      {{ statusLabel(booking.status) }}
    </span>
  </div>

  <div class="mt-3 space-y-2">
    <div class="flex items-start gap-2.5">
      <span class="mt-1.5 h-2 w-2 shrink-0 rounded-full bg-[#008c95]"></span>
      <p class="text-base font-bold leading-snug text-slate-950">{{ booking.pickup.address }}</p>
    </div>
    <div class="flex items-start gap-2.5">
      <span class="mt-1.5 h-2 w-2 shrink-0 rounded-full bg-orange-500"></span>
      <p class="text-sm leading-snug text-slate-500">{{ booking.dropoff.address }}</p>
    </div>
  </div>

  <div class="mt-4 flex items-center justify-between border-t border-slate-100 pt-3 text-sm">
    <span class="text-slate-500">{{ booking.distanceKm }} km · {{ booking.durationMin }} phút</span>
    <span class="font-bold text-slate-950">{{ formatAmount(booking.finalAmount) }}</span>
  </div>
</button>
