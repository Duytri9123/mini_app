<button
  type="button"
  class="w-full rounded-2xl border border-slate-100 bg-white p-4 text-left shadow-sm active:scale-[0.99]"
  (click)="openBooking.emit(booking)"
>
  <div class="flex items-start justify-between gap-3">
    <div>
      <p class="text-xs font-bold uppercase text-[#008c95]">
        {{ typeLabel(booking.type) }} - {{ booking.id }}
      </p>
      <h3 class="mt-1 text-base font-bold text-slate-950">{{ booking.pickup.address }}</h3>
      <p class="mt-1 text-sm text-slate-500">{{ booking.dropoff.address }}</p>
    </div>
    <span class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-semibold text-slate-600">
      {{ booking.status }}
    </span>
  </div>
  <div class="mt-4 flex items-center justify-between border-t border-slate-100 pt-3 text-sm">
    <span class="text-slate-500">{{ booking.distanceKm }} km - {{ booking.durationMin }} phut</span>
    <span class="font-bold text-slate-950">{{ formatAmount(booking.finalAmount) }}</span>
  </div>
</button>
