<div class="flex flex-col items-center justify-center px-6 py-12 text-center">
  <div class="mb-3 flex h-14 w-14 items-center justify-center rounded-2xl bg-[#008c95]/10 text-[#008c95]">
    <ion-icon [name]="icon" class="text-2xl"></ion-icon>
  </div>
  <h3 class="text-base font-bold text-slate-900">{{ title }}</h3>
  <p class="mt-1 max-w-xs text-sm leading-6 text-slate-500">{{ description }}</p>
  <button
    *ngIf="ctaLabel"
    type="button"
    class="mt-5 rounded-xl bg-[#008c95] px-4 py-2 text-sm font-semibold text-white"
    (click)="ctaClick.emit()"
  >
    {{ ctaLabel }}
  </button>
</div>
