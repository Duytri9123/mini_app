<div class="rounded-2xl border border-red-100 bg-red-50 p-4 text-red-700">
  <div class="flex items-start gap-3">
    <ion-icon name="alert-circle-outline" class="mt-0.5 text-xl"></ion-icon>
    <div class="flex-1">
      <h3 class="font-semibold">{{ title }}</h3>
      <p class="mt-1 text-sm text-red-600">{{ description }}</p>
      <button type="button" class="mt-3 text-sm font-semibold underline" (click)="retry.emit()">
        {{ retryLabel }}
      </button>
    </div>
  </div>
</div>
