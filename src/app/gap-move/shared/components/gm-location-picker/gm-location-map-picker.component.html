<div class="fixed inset-0 z-[80] bg-white lg:bg-slate-950/55 lg:p-5 lg:backdrop-blur-sm">
  <div class="relative mx-auto flex h-full max-w-7xl flex-col overflow-hidden rounded-none bg-white lg:rounded-[24px] lg:shadow-2xl">
    <div class="absolute inset-x-4 top-4 z-[90] flex items-center gap-3">
      <button
        type="button"
        class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full border border-slate-100 bg-white text-slate-700 shadow-lg transition active:scale-[0.95]"
        (click)="closePicker.emit()"
      >
        <ion-icon name="chevron-back-outline" class="text-2xl"></ion-icon>
      </button>

      <div class="relative min-w-0 flex-1">
        <div class="flex h-11 items-center gap-3 rounded-full border border-slate-100/80 bg-white px-4 shadow-lg">
          <span
            class="flex h-5 w-5 shrink-0 items-center justify-center rounded-full"
            [ngClass]="activeAddressField === 'pickup' ? 'bg-inverse-primary/10 text-inverse-primary' : 'bg-inverse-primary text-white'"
          >
            <ion-icon [name]="activeAddressField === 'pickup' ? 'navigate' : 'location'" class="text-xs"></ion-icon>
          </span>
          <input
            name="locationMapSearchQuery"
            [ngModel]="searchQuery"
            (ngModelChange)="updateSearchQuery($event)"
            placeholder="Tìm kiếm địa chỉ..."
            class="min-w-0 flex-1 border-0 bg-transparent text-sm font-bold text-slate-800 outline-none placeholder:text-slate-400"
          />
        </div>

        <div
          *ngIf="searchResults.length"
          class="absolute inset-x-0 top-full z-[100] mt-2 max-h-[220px] overflow-y-auto rounded-2xl border border-slate-100 bg-white shadow-xl"
        >
          <button
            *ngFor="let result of searchResults"
            type="button"
            class="block w-full border-b border-slate-100 px-4 py-3.5 text-left text-sm font-semibold text-slate-600 last:border-b-0 hover:bg-slate-50"
            (click)="selectSearchResult.emit(result)"
          >
            {{ result.address }}
          </button>
        </div>
      </div>
    </div>

    <div class="absolute inset-0 z-10 h-full w-full">
      <app-gm-map
        class="block h-full w-full"
        [pickup]="pickup"
        [dropoff]="dropoff"
        [stops]="stops"
        [stopIndexes]="stopIndexes"
        [selectable]="true"
        [draggable]="true"
        (selectCoordinate)="selectCoordinate.emit($event)"
        (markerDragEnd)="markerDragEnd.emit($event)"
      ></app-gm-map>
    </div>

    <button
      type="button"
      class="absolute right-4 top-[76px] z-[95] flex h-11 w-11 items-center justify-center rounded-full border border-slate-100 bg-white text-slate-800 shadow-xl transition active:scale-[0.95]"
      (click)="locate.emit()"
    >
      <ion-icon [name]="isLocating ? 'sync-outline' : 'locate-outline'" class="text-xl"></ion-icon>
    </button>

    <div class="absolute inset-x-4 bottom-4 z-40 flex max-h-[78vh] flex-col gap-3.5 overflow-y-auto rounded-[20px] border border-slate-100/80 bg-white p-4 shadow-[0_12px_36px_rgba(15,23,42,0.18)]">
      <div>
        <span class="text-[10px] font-black uppercase tracking-wider text-inverse-primary">Vị trí đang chọn</span>
        <p class="mt-1 line-clamp-2 text-[14px] font-extrabold leading-5 text-slate-900">{{ pendingAddress }}</p>
      </div>

      <button
        *ngIf="detailsRequired"
        type="button"
        class="flex w-full items-center gap-3 rounded-2xl border border-slate-100 bg-slate-50 px-3 py-3 text-left transition active:scale-[0.99]"
        (click)="toggleDetails()"
      >
        <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-primary-soft text-primary">
          <ion-icon name="person-circle-outline" class="text-xl"></ion-icon>
        </span>
        <span class="min-w-0 flex-1">
          <span class="block text-sm font-extrabold text-slate-950">Thông tin người nhận</span>
        </span>
        <ion-icon [name]="isDetailsOpen ? 'chevron-up-outline' : 'chevron-down-outline'" class="text-xl text-slate-500"></ion-icon>
      </button>

      <div *ngIf="detailsRequired && isDetailsOpen" class="grid gap-3">
        <input
          name="locationMapAddressContactName"
          [(ngModel)]="details.contactName"
          placeholder="Nhập tên người nhận"
          class="h-11 rounded-xl border border-slate-200 px-3 text-sm font-semibold outline-none placeholder:text-slate-400"
        />
        <label class="flex h-11 items-center gap-2 rounded-xl border border-slate-200 px-3">
          <input
            name="locationMapAddressPhone"
            [(ngModel)]="details.phone"
            inputmode="tel"
            placeholder="Nhập số điện thoại"
            class="min-w-0 flex-1 border-0 bg-transparent text-sm font-semibold outline-none placeholder:text-slate-400"
          />
          <ion-icon name="person-circle-outline" class="text-xl text-slate-500"></ion-icon>
        </label>
        <div class="flex flex-wrap gap-2">
          <button type="button" class="rounded-xl bg-primary-soft px-3 py-2 text-sm font-bold text-primary" (click)="useContactBook.emit()">Dùng danh bạ</button>
          <button type="button" class="rounded-xl bg-primary-soft px-3 py-2 text-sm font-bold text-primary" (click)="useMyInfo.emit()">Dùng thông tin của tôi</button>
        </div>
        <label class="grid gap-2 text-[15px] font-extrabold text-slate-950">
          Ghi chú cho tài xế
          <span class="relative block">
            <textarea
              name="locationMapAddressNote"
              [(ngModel)]="details.note"
              maxlength="250"
              placeholder="Thêm ghi chú, ví dụ: cổng đỏ, lầu 2."
              class="h-24 w-full resize-none rounded-xl border border-slate-200 px-3 py-2.5 pb-7 text-sm font-semibold leading-5 outline-none placeholder:text-slate-400"
            ></textarea>
            <span class="absolute bottom-2 right-3 text-xs font-bold text-slate-400">{{ details.note.length }}/250</span>
          </span>
        </label>
        <label class="flex items-start gap-3 rounded-2xl border border-slate-100 bg-white px-3 py-3 text-left shadow-sm">
          <input type="checkbox" name="locationMapAddressSave" [(ngModel)]="details.saveAddress" class="mt-1 h-5 w-5 rounded border-slate-200" />
          <span class="min-w-0">
            <span class="block text-sm font-extrabold text-slate-900">Lưu địa chỉ này</span>
            <!-- <span class="mt-0.5 block text-xs font-semibold leading-5 text-slate-400">Lưu thông tin người nhận cho lần đặt sau.</span> -->
          </span>
        </label>
      </div>

      <div class="flex gap-2">
        <button type="button" class="flex-1 rounded-xl bg-slate-100 py-3 text-sm font-extrabold text-slate-600 transition active:scale-[0.98]" (click)="closePicker.emit()">Đóng</button>
        <button
          type="button"
          class="flex-[2] rounded-xl bg-inverse-primary py-3 text-sm font-extrabold text-white shadow-lg shadow-orange-500/20 transition active:scale-[0.98] disabled:bg-slate-300 disabled:shadow-none"
          [disabled]="!hasPendingSelection || !detailsComplete"
          (click)="confirmSelection.emit()"
        >
          Xác nhận
        </button>
      </div>
    </div>
  </div>
</div>
