<div class="fixed inset-0 z-[90] bg-white px-4 pt-7" [class.lg:hidden]="mobileOnly">
  <div class="gm-address-search-box flex h-13 items-center gap-3 rounded-2xl bg-white px-3 shadow-lg shadow-slate-900/8 ring-1 ring-slate-100/90">
    <button type="button" class="flex h-9 w-9 shrink-0 items-center justify-center text-slate-500" aria-label="Quay lại" (click)="closePicker.emit()">
      <ion-icon name="chevron-back-outline" class="text-2xl"></ion-icon>
    </button>
    <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-inverse-primary text-white">
      <ion-icon name="location" class="text-lg"></ion-icon>
    </span>
    <input
      name="locationSearchQuery"
      class="gm-address-search-input min-w-0 flex-1 border-0 bg-transparent text-base font-bold text-slate-800 outline-none placeholder:text-slate-400"
      [ngModel]="query"
      (ngModelChange)="updateQuery($event)"
      [placeholder]="placeholder"
    />
  </div>

  <div class="mt-5">
    <button type="button" class="flex w-full items-center gap-4 border-b border-slate-100/80 pb-3.5 text-left" (click)="useCurrentLocation.emit()">
      <ion-icon name="locate-outline" class="text-2xl text-slate-500"></ion-icon>
      <span class="min-w-0">
        <span class="block text-sm font-extrabold text-slate-900">Vị trí hiện tại</span>
        <span class="mt-0.5 block truncate text-xs font-semibold text-slate-400">{{ currentAddress }}</span>
      </span>
    </button>

    <button type="button" class="flex w-full items-center justify-between gap-4 border-b border-slate-100/80 py-3.5 text-left" (click)="chooseMap.emit()">
      <span class="flex min-w-0 items-center gap-4">
        <ion-icon name="map" class="text-2xl text-primary"></ion-icon>
        <span class="block text-sm font-extrabold text-slate-900">Chọn trên bản đồ</span>
      </span>
      <ion-icon name="chevron-forward-outline" class="text-xl text-slate-400"></ion-icon>
    </button>

    <button type="button" class="flex w-full items-center justify-between gap-4 border-b border-slate-100/80 py-3.5 text-left" (click)="toggleSavedAddresses.emit()">
      <span class="flex min-w-0 items-center gap-4">
        <ion-icon name="bookmark" class="text-2xl text-inverse-primary"></ion-icon>
        <span class="block text-sm font-extrabold text-slate-900">Địa chỉ đã lưu</span>
      </span>
      <ion-icon [name]="isSavedAddressesOpen ? 'chevron-up-outline' : 'chevron-forward-outline'" class="text-xl text-slate-400"></ion-icon>
    </button>

    <div *ngIf="isSavedAddressesOpen" class="border-b border-slate-100/80 bg-slate-50/60">
      <div *ngIf="savedAddressesLoading" class="px-1 py-3 text-sm font-semibold text-slate-400">Đang tải địa chỉ...</div>
      <div *ngIf="!savedAddressesLoading && !savedAddresses.length" class="px-1 py-3 text-sm font-semibold text-slate-400">Chưa có địa chỉ đã lưu.</div>
      <button
        *ngFor="let item of savedAddresses"
        type="button"
        class="flex w-full items-start gap-3 py-3 text-left"
        (click)="selectSavedAddress.emit(item)"
      >
        <ion-icon name="bookmark" class="mt-0.5 text-xl text-inverse-primary"></ion-icon>
        <span class="min-w-0 flex-1">
          <span class="flex items-center gap-2">
            <span class="truncate text-sm font-extrabold text-slate-900">{{ item.label || 'Địa chỉ' }}</span>
            <span *ngIf="item.is_default" class="rounded-full bg-primary-soft px-2 py-0.5 text-[10px] font-black uppercase text-primary">Mặc định</span>
          </span>
          <span class="mt-0.5 line-clamp-2 text-xs font-semibold leading-5 text-slate-500">{{ item.address }}</span>
          <span *ngIf="getSavedAddressDetailsText(item) as detailsText" class="mt-0.5 block truncate text-xs font-bold text-slate-400">{{ detailsText }}</span>
        </span>
      </button>
    </div>

    <div *ngIf="confirmedHistory.length" class="border-b border-slate-100/80 py-2">
      <button
        *ngFor="let item of confirmedHistory"
        type="button"
        class="flex w-full items-start gap-3 py-2.5 text-left"
        (click)="selectConfirmedHistory.emit(item)"
      >
        <ion-icon name="time-outline" class="mt-0.5 text-xl text-slate-500"></ion-icon>
        <span class="min-w-0 flex-1">
          <span class="line-clamp-2 text-xs font-semibold leading-5 text-slate-600">{{ item.address }}</span>
          <span *ngIf="item.detailsText" class="mt-0.5 block truncate text-xs font-bold text-slate-400">{{ item.detailsText }}</span>
        </span>
      </button>
    </div>
  </div>

  <div *ngIf="searchResults.length" class="mt-2 divide-y divide-slate-100/80">
    <button
      *ngFor="let result of searchResults"
      type="button"
      class="flex w-full items-start gap-3.5 py-3.5 text-left"
      (click)="selectSearchResult.emit(result)"
    >
      <ion-icon name="location-outline" class="mt-0.5 text-xl text-slate-400"></ion-icon>
      <span class="min-w-0 flex-1 text-sm font-semibold leading-5 text-slate-600">{{ result.address }}</span>
    </button>
  </div>
</div>
