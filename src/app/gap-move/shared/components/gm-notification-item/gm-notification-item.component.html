<button
  type="button"
  class="flex w-full gap-3 rounded-2xl border p-4 text-left"
  [ngClass]="!notification.read ? 'border-[#008c95]/20 bg-[#008c95]/5' : 'border-slate-100 bg-white'"
  [class.border-slate-100]="notification.read"
  [class.bg-white]="notification.read"
  (click)="read.emit(notification.id)"
>
  <span class="mt-1 h-2.5 w-2.5 rounded-full" [ngClass]="!notification.read ? 'bg-[#008c95]' : 'bg-slate-300'"></span>
  <span class="flex-1">
    <span class="block text-sm font-bold text-slate-950">{{ notification.title }}</span>
    <span class="mt-1 block text-sm leading-6 text-slate-500">{{ notification.body }}</span>
  </span>
</button>
