<header class="px-4 pb-4 pt-5">
  <p *ngIf="eyebrow" class="text-xs font-bold uppercase text-[#ff5a00]">{{ eyebrow }}</p>
  <h1 class="mt-1 text-2xl font-extrabold text-slate-950">{{ title }}</h1>
  <p *ngIf="description" class="mt-2 text-sm leading-6 text-slate-500">{{ description }}</p>
</header>
