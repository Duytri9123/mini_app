<section class="rounded-2xl border border-slate-100 bg-white p-4 shadow-sm">
  <div class="space-y-3">
    <div class="flex gap-3">
      <span class="mt-1 h-3 w-3 shrink-0 rounded-full bg-[#008c95]"></span>
      <div class="min-w-0">
        <p class="text-xs font-semibold uppercase text-slate-400">Điểm đón</p>
        <p class="text-sm font-semibold text-slate-900">{{ pickup?.address || 'Chưa chọn' }}</p>
      </div>
    </div>
    <div class="ml-1 h-6 border-l border-dashed border-slate-300"></div>
    <div class="flex gap-3">
      <span class="mt-1 h-3 w-3 shrink-0 rounded-full bg-orange-500"></span>
      <div class="min-w-0">
        <p class="text-xs font-semibold uppercase text-slate-400">Điểm đến</p>
        <p class="text-sm font-semibold text-slate-900">{{ dropoff?.address || 'Chưa chọn' }}</p>
      </div>
    </div>
  </div>
  <div class="mt-4 grid grid-cols-3 gap-2 rounded-xl bg-slate-50 p-3 text-center text-xs">
    <div>
      <p class="font-bold text-slate-900">{{ distanceKm | number: '1.1-1' }} km</p>
      <p class="text-slate-500">Quãng đường</p>
    </div>
    <div>
      <p class="font-bold text-slate-900">{{ durationMin }} phút</p>
      <p class="text-slate-500">Dự kiến</p>
    </div>
    <div>
      <p class="font-bold text-[#008c95]">{{ formatAmount(finalAmount) }}</p>
      <p class="text-slate-500">Tạm tính</p>
    </div>
  </div>
</section>
