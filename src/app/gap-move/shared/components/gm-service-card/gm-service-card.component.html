<button
  type="button"
  class="flex min-h-[108px] w-full flex-col items-start rounded-2xl border border-slate-100 bg-white p-4 text-left shadow-sm active:scale-[0.98]"
  (click)="selectService.emit(service)"
>
  <span class="mb-3 flex h-10 w-10 items-center justify-center rounded-xl text-white" [ngClass]="service.colorClass">
    <ion-icon [name]="service.icon" class="text-xl"></ion-icon>
  </span>
  <span class="text-sm font-bold text-slate-950">{{ service.title }}</span>
  <span class="mt-1 text-xs leading-5 text-slate-500">{{ service.subtitle }}</span>
</button>
